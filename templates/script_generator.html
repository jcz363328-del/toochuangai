<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假睫毛脚本生成器 - 图创AI系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-section i {
            font-size: 1.5rem;
        }

        .logo-section h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            height: calc(100vh - 120px);
        }

        .input-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            height: fit-content;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
        }

        .output-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title i {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .quantity-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px;
            border-radius: 15px;
            color: white;
            margin-bottom: 25px;
        }

        .quantity-section h3 {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quantity-input {
            width: 80px;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        .btn-success {
            background: #28a745;
            color: white;
            width: 100%;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .output-controls {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        .scripts-container {
            flex: 1;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            border: 2px solid #e9ecef;
        }

        .script-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border-left: 4px solid #667eea;
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
        }

        .script-number {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1rem;
        }

        .script-content {
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: 500;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 20px;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .input-panel {
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .container {
                padding: 20px 15px;
                gap: 20px;
            }

            .input-panel, .output-panel {
                padding: 20px;
            }
        }
    </style>
    <link href="{{ url_for('static', filename='css/unified_theme.css') }}" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <i class="fas fa-file-alt"></i>
                <h1>假睫毛脚本生成器</h1>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('dashboard') }}">
                    <i class="fas fa-home"></i> 主页
                </a>

            </div>
        </div>
    </header>

    <div class="container">
        <!-- 输入面板 -->
        <div class="input-panel">
            <h2 class="panel-title">
                <i class="fas fa-edit"></i>
                产品信息输入
            </h2>

            <form id="scriptForm">
                <div class="form-group">
                    <label class="form-label" for="productName">
                        <i class="fas fa-tag"></i> 商品名称
                    </label>
                    <input type="text" id="productName" class="form-input"
                           placeholder="请输入假睫毛产品名称" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="productFeatures">
                        <i class="fas fa-list"></i> 商品特征 (每行一个)
                    </label>
                    <textarea id="productFeatures" class="form-input form-textarea"
                              placeholder="请输入产品特征，每行一个特征&#10;例如：&#10;超长持久&#10;自然卷翘&#10;防水防汗&#10;易于佩戴" required></textarea>
                </div>

                <div class="quantity-section">
                    <h3><i class="fas fa-copy"></i> 批量生成设置</h3>
                    <div class="quantity-controls">
                        <label for="quantity">生成数量:</label>
                        <input type="number" id="quantity" class="quantity-input"
                               min="1" max="10" value="1">
                        <span>个脚本</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="generateBtn">
                    <i class="fas fa-magic"></i> 生成脚本
                </button>

                <button type="button" class="btn btn-secondary" onclick="clearInputs()">
                    <i class="fas fa-eraser"></i> 清空输入
                </button>

                <button type="button" class="btn btn-success" onclick="copyAllScripts()">
                    <i class="fas fa-copy"></i> 复制所有脚本
                </button>
            </form>
        </div>

        <!-- 输出面板 -->
        <div class="output-panel">
            <div class="output-header">
                <h2 class="panel-title">
                    <i class="fas fa-file-text"></i>
                    生成的脚本
                </h2>
                <div class="output-controls">
                    <button class="btn btn-secondary btn-small" onclick="saveToFile()">
                        <i class="fas fa-download"></i> 保存文件
                    </button>
                    <button class="btn btn-secondary btn-small" onclick="clearOutput()">
                        <i class="fas fa-trash"></i> 清空输出
                    </button>
                </div>
            </div>

            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div id="statusMessage"></div>

            <div class="scripts-container" id="scriptsContainer">
                <div class="empty-state">
                    <i class="fas fa-file-alt"></i>
                    <h3>暂无生成的脚本</h3>
                    <p>请在左侧输入产品信息并点击生成脚本</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isGenerating = false;

        document.getElementById('scriptForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            await generateScripts();
        });

        async function generateScripts() {
            if (isGenerating) return;

            const productName = document.getElementById('productName').value.trim();
            const featuresText = document.getElementById('productFeatures').value.trim();
            const quantity = parseInt(document.getElementById('quantity').value);

            if (!productName || !featuresText) {
                showStatus('请填写完整的产品信息', 'error');
                return;
            }

            const features = featuresText.split('\n').filter(f => f.trim());
            if (features.length === 0) {
                showStatus('请至少输入一个产品特征', 'error');
                return;
            }

            isGenerating = true;
            const generateBtn = document.getElementById('generateBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const scriptsContainer = document.getElementById('scriptsContainer');

            // 更新UI状态
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            scriptsContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在使用AI并发生成脚本，预计耗时减少50%...</p></div>';

            // 模拟进度更新
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
            }, 200);

            try {
                const startTime = Date.now();
                const response = await fetch('/generate_script', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_name: productName,
                        features: features,
                        quantity: quantity
                    })
                });

                const result = await response.json();
                const endTime = Date.now();
                const duration = ((endTime - startTime) / 1000).toFixed(1);

                clearInterval(progressInterval);

                if (result.success) {
                    displayScripts(result.scripts);
                    showStatus(`成功生成 ${result.scripts.length} 个脚本！耗时 ${duration} 秒`, 'success');
                    progressFill.style.width = '100%';
                } else {
                    showStatus(result.message, 'error');
                    scriptsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>生成失败</h3><p>' + result.message + '</p></div>';
                    console.error('API错误:', result.message);
                }

            } catch (error) {
                clearInterval(progressInterval);
                showStatus('网络错误，请检查服务器连接', 'error');
                scriptsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>网络错误</h3><p>请检查服务器连接</p></div>';
                console.error('请求错误:', error);
            } finally {
                isGenerating = false;
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fas fa-magic"></i> 生成脚本';
                setTimeout(() => {
                    progressBar.style.display = 'none';
                }, 1000);
            }
        }
        
        function displayScripts(scripts) {
            const container = document.getElementById('scriptsContainer');
            container.innerHTML = '';
            
            scripts.forEach(script => {
                const scriptElement = document.createElement('div');
                scriptElement.className = 'script-item';
                scriptElement.innerHTML = `
                    <div class="script-header">
                        <span class="script-number">脚本 #${script.number}</span>
                        <button class="btn btn-secondary btn-small" onclick="copyScript(this)">
                            <i class="fas fa-copy"></i> 复制
                        </button>
                    </div>
                    <div class="script-content">${script.content}</div>
                `;
                container.appendChild(scriptElement);
            });
        }
        
        function copyScript(button) {
            const scriptContent = button.closest('.script-item').querySelector('.script-content').textContent;
            navigator.clipboard.writeText(scriptContent).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check"></i> 已复制';
                button.style.background = '#28a745';
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.style.background = '';
                }, 2000);
            });
        }
        
        function copyAllScripts() {
            const scripts = document.querySelectorAll('.script-content');
            if (scripts.length === 0) {
                showStatus('没有可复制的脚本', 'error');
                return;
            }
            
            let allContent = '';
            scripts.forEach((script, index) => {
                allContent += `脚本 #${index + 1}\n${'='.repeat(50)}\n${script.textContent}\n\n`;
            });
            
            navigator.clipboard.writeText(allContent).then(() => {
                showStatus('所有脚本已复制到剪贴板', 'success');
            });
        }
        
        function clearInputs() {
            document.getElementById('productName').value = '';
            document.getElementById('productFeatures').value = '';
            document.getElementById('quantity').value = '1';
        }
        
        function clearOutput() {
            document.getElementById('scriptsContainer').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-file-alt"></i>
                    <h3>暂无生成的脚本</h3>
                    <p>请在左侧输入产品信息并点击生成脚本</p>
                </div>
            `;
            document.getElementById('statusMessage').innerHTML = '';
        }
        
        function saveToFile() {
            const scripts = document.querySelectorAll('.script-content');
            if (scripts.length === 0) {
                showStatus('没有可保存的脚本', 'error');
                return;
            }
            
            let content = '假睫毛脚本生成结果\n';
            content += '生成时间: ' + new Date().toLocaleString() + '\n\n';
            
            scripts.forEach((script, index) => {
                content += `脚本 #${index + 1}\n${'='.repeat(50)}\n${script.textContent}\n\n`;
            });
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `假睫毛脚本_${new Date().toISOString().slice(0, 10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus('脚本文件已保存', 'success');
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status-message status-${type}`;
            statusDiv.textContent = message;
            
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
