<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模特排队</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fb;
            color: #152033;
        }
        button, input, select { font: inherit; }
        .page {
            width: min(96vw, 1440px);
            margin: 0 auto;
            padding: 18px 0 28px;
        }
        .topbar {
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;
        }
        .title-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .brand-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            background: #1f6feb;
            color: #fff;
            flex: 0 0 auto;
        }
        .title {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            line-height: 1.2;
            color: #101828;
        }
        .subtitle {
            margin-top: 4px;
            color: #667085;
            font-size: 12px;
            line-height: 1.35;
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }
        .btn {
            min-height: 36px;
            border: 1px solid #d0d8e8;
            border-radius: 8px;
            background: #fff;
            color: #344054;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 0 12px;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn.primary {
            border-color: #1f6feb;
            background: #1f6feb;
            color: #fff;
        }
        .btn.danger {
            border-color: #fecdca;
            background: #fff5f5;
            color: #b42318;
        }
        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.52;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .metric {
            background: #fff;
            border: 1px solid #e4e9f2;
            border-radius: 8px;
            padding: 13px 14px;
            min-width: 0;
        }
        .metric-label {
            color: #667085;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 6px;
        }
        .metric-value {
            color: #101828;
            font-size: 26px;
            font-weight: 800;
            line-height: 1;
        }
        .metric-note {
            color: #98a2b3;
            font-size: 12px;
            margin-top: 6px;
        }
        .toolbar {
            background: #fff;
            border: 1px solid #e4e9f2;
            border-radius: 8px;
            padding: 10px;
            display: grid;
            grid-template-columns: minmax(160px, 1.1fr) minmax(150px, 1fr) repeat(4, minmax(116px, 0.8fr)) minmax(180px, auto) minmax(120px, auto) auto;
            gap: 8px;
            align-items: end;
            margin-bottom: 12px;
        }
        .field { min-width: 0; }
        .label {
            display: block;
            color: #667085;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .control {
            width: 100%;
            height: 38px;
            border: 1px solid #d0d8e8;
            border-radius: 8px;
            background: #fff;
            color: #101828;
            padding: 0 10px;
            outline: none;
        }
        .control:focus {
            border-color: #1f6feb;
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.11);
        }
        .segmented {
            height: 38px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            border: 1px solid #d0d8e8;
            border-radius: 8px;
            background: #f8fafc;
            max-width: 100%;
        }
        .segmented button {
            height: 28px;
            border: 0;
            border-radius: 6px;
            padding: 0 9px;
            color: #667085;
            background: transparent;
            cursor: pointer;
            white-space: nowrap;
        }
        .segmented button.active {
            background: #fff;
            color: #1f6feb;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
        }
        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 12px;
            align-items: start;
        }
        .panel {
            background: #fff;
            border: 1px solid #e4e9f2;
            border-radius: 8px;
            min-width: 0;
            overflow: hidden;
        }
        .panel-head {
            min-height: 52px;
            padding: 12px 14px;
            border-bottom: 1px solid #edf1f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .panel-title {
            font-size: 16px;
            font-weight: 800;
            color: #101828;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title i { color: #1f6feb; }
        .result-count {
            color: #667085;
            font-size: 12px;
            text-align: right;
        }
        .model-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            padding: 12px;
        }
        .model-card {
            border: 1px solid #e4e9f2;
            border-radius: 8px;
            background: #fff;
            min-width: 0;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
        }
        .model-card:hover,
        .model-card.active {
            border-color: #9ec5fe;
            box-shadow: 0 10px 24px rgba(31, 111, 235, 0.10);
            transform: translateY(-1px);
        }
        .media {
            height: clamp(320px, 28vw, 480px);
            background: #111827;
            position: relative;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .model-card.media-ready .media {
            height: auto;
            aspect-ratio: 16 / 9;
        }
        .model-card.media-portrait .media {
            aspect-ratio: 3 / 4;
        }
        .model-card.media-square .media {
            aspect-ratio: 1 / 1;
        }
        .media video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            display: block;
            position: relative;
            z-index: 1;
            background: #111827;
        }
        .media .play,
        .empty-video .play {
            position: relative;
            z-index: 2;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: rgba(255,255,255,.88);
            color: #1f6feb;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
        }
        .empty-video {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            color: #667085;
        }
        .card-body { padding: 11px; }
        .model-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }
        .model-name {
            min-width: 0;
            font-weight: 800;
            color: #101828;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .model-code {
            color: #667085;
            font-size: 12px;
            white-space: nowrap;
        }
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            max-width: 100%;
            min-height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            color: #344054;
            background: #f2f4f7;
            font-size: 12px;
        }
        .chip.good { background: #ecfdf3; color: #027a48; }
        .chip.warn { background: #fffaeb; color: #b54708; }
        .chip.blue { background: #eff8ff; color: #175cd3; }
        .queue-strip {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 8px;
            padding-top: 9px;
            border-top: 1px solid #edf1f7;
        }
        .queue-main {
            color: #101828;
            font-size: 13px;
            font-weight: 800;
        }
        .queue-sub {
            margin-top: 2px;
            color: #667085;
            font-size: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .mini-action {
            width: 34px;
            height: 34px;
            border: 0;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: #fff;
            background: #1f6feb;
            cursor: pointer;
        }
        .mini-action.cancel { background: #d92d20; }
        .mini-action:disabled {
            opacity: .45;
            cursor: not-allowed;
        }
        .list-footer {
            border-top: 1px solid #edf1f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            flex-wrap: wrap;
        }
        .page-info {
            color: #667085;
            font-size: 12px;
        }
        .pagination {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .page-btn {
            min-width: 32px;
            height: 32px;
            border: 1px solid #d0d8e8;
            border-radius: 7px;
            background: #fff;
            color: #344054;
            cursor: pointer;
            padding: 0 9px;
        }
        .page-btn.active {
            background: #1f6feb;
            color: #fff;
            border-color: #1f6feb;
        }
        .page-btn:disabled {
            color: #98a2b3;
            cursor: not-allowed;
            background: #f8fafc;
        }
        .detail-panel {
            position: sticky;
            top: 12px;
        }
        .detail-media {
            height: min(70vh, 680px);
            min-height: 460px;
            background: #111827;
            display: grid;
            place-items: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .detail-media::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(31,111,235,.45), transparent 52%),
                linear-gradient(45deg, rgba(217,119,6,.30), transparent 44%);
        }
        .detail-media video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 1;
            background: #111827;
        }
        .detail-media .play {
            position: relative;
            z-index: 1;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: rgba(255,255,255,.92);
            color: #1f6feb;
            font-size: 18px;
        }
        .detail-body { padding: 14px; }
        .detail-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .detail-name {
            margin: 0;
            font-size: 21px;
            font-weight: 900;
            color: #101828;
            word-break: break-word;
        }
        .detail-code {
            color: #667085;
            font-size: 12px;
            margin-top: 4px;
        }
        .status-pill {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 0 10px;
            color: #027a48;
            background: #ecfdf3;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }
        .status-pill.paused {
            color: #b54708;
            background: #fffaeb;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }
        .detail-cell {
            border: 1px solid #edf1f7;
            border-radius: 8px;
            padding: 9px;
            min-width: 0;
        }
        .cell-label {
            color: #667085;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .cell-value {
            color: #101828;
            font-size: 13px;
            font-weight: 800;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .remark {
            border: 1px solid #edf1f7;
            border-radius: 8px;
            padding: 10px;
            color: #475467;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 12px;
            word-break: break-word;
        }
        .queue-box {
            border: 1px solid #edf1f7;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .queue-box-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            color: #101828;
            font-weight: 900;
        }
        .timeline {
            display: grid;
            gap: 8px;
        }
        .timeline-row {
            display: grid;
            grid-template-columns: 26px 1fr auto;
            gap: 8px;
            align-items: center;
        }
        .rank {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #eff4ff;
            color: #175cd3;
            font-size: 12px;
            font-weight: 900;
        }
        .operator { min-width: 0; }
        .operator-name {
            color: #101828;
            font-size: 13px;
            font-weight: 800;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .operator-note {
            color: #667085;
            font-size: 12px;
            margin-top: 1px;
        }
        .current-tag {
            color: #027a48;
            background: #ecfdf3;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 12px;
            white-space: nowrap;
        }
        .detail-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .empty,
        .loading {
            padding: 38px 14px;
            color: #667085;
            text-align: center;
            grid-column: 1 / -1;
        }
        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 1000;
            max-width: min(360px, 90vw);
            padding: 10px 12px;
            border-radius: 8px;
            background: #101828;
            color: #fff;
            font-size: 13px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, .24);
            display: none;
        }
        .toast.show { display: block; }
        @media (max-width: 1280px) {
            .toolbar {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
        @media (max-width: 1180px) {
            .layout { grid-template-columns: 1fr; }
            .detail-panel { position: static; }
        }
        @media (max-width: 820px) {
            .page { width: min(94vw, 680px); padding-top: 12px; }
            .topbar { align-items: flex-start; flex-direction: column; }
            .top-actions { width: 100%; }
            .top-actions .btn { flex: 1; }
            .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .toolbar { grid-template-columns: 1fr; }
            .segmented { width: 100%; justify-content: space-between; }
            .segmented button { flex: 1; padding: 0 6px; }
            .model-list { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
            .detail-actions { grid-template-columns: 1fr; }
            .detail-media {
                height: min(78vh, 560px);
                min-height: 360px;
            }
            .title { font-size: 22px; }
            .list-footer { align-items: flex-start; flex-direction: column; }
            .pagination { width: 100%; }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="topbar">
        <div class="title-wrap">
            <div class="brand-icon"><i class="fas fa-user-clock"></i></div>
            <div>
                <h1 class="title">模特排队</h1>
                <div class="subtitle">按模特卡片查看队列，选中后在右侧处理排队</div>
            </div>
        </div>
        <div class="top-actions">
            <button class="btn" type="button" id="refreshBtn"><i class="fas fa-rotate-right"></i> 刷新</button>
            <a class="btn" href="{{ url_for('dashboard') }}"><i class="fas fa-home"></i> 首页</a>
        </div>
    </header>

    <section class="metrics">
        <div class="metric">
            <div class="metric-label"><i class="fas fa-list-check"></i> 当前页排队</div>
            <div class="metric-value" id="metricQueued">0</div>
            <div class="metric-note">当前列表内累计人数</div>
        </div>
        <div class="metric">
            <div class="metric-label"><i class="fas fa-user-check"></i> 我已排队</div>
            <div class="metric-value" id="metricMine">0</div>
            <div class="metric-note">当前页可见数据</div>
        </div>
        <div class="metric">
            <div class="metric-label"><i class="fas fa-video"></i> 筛选结果</div>
            <div class="metric-value" id="metricTotal">0</div>
            <div class="metric-note">符合条件的模特数</div>
        </div>
        <div class="metric">
            <div class="metric-label"><i class="fas fa-bolt"></i> 最快到号</div>
            <div class="metric-value" id="metricFastest">-</div>
            <div class="metric-note">我前面等待人数</div>
        </div>
    </section>

    <section class="toolbar" aria-label="筛选条件">
        <div class="field">
            <label class="label" for="nameFilter">模特姓名</label>
            <input class="control" id="nameFilter" type="text" placeholder="输入姓名后回车">
        </div>
        <div class="field">
            <label class="label" for="responsibleFilter">负责人</label>
            <input class="control" id="responsibleFilter" type="text" placeholder="技术部负责人">
        </div>
        <div class="field">
            <label class="label" for="sortSelect">排序</label>
            <select class="control" id="sortSelect">
                <option value="queue_count_desc" selected>排队人数多到少</option>
                <option value="queue_count_asc">排队人数少到多</option>
                <option value="created_desc">创建时间新到旧</option>
            </select>
        </div>
        <div class="field">
            <label class="label" for="statusFilter">状态</label>
            <select class="control" id="statusFilter">
                <option value="">全部</option>
                <option value="合作中">合作中</option>
                <option value="暂停拍摄">暂停拍摄</option>
            </select>
        </div>
        <div class="field">
            <label class="label" for="countryFilter">国家</label>
            <select class="control" id="countryFilter">
                <option value="">全部</option>
                <option value="中国">中国</option>
                <option value="美国">美国</option>
                <option value="英国">英国</option>
                <option value="加拿大">加拿大</option>
                <option value="牙买加">牙买加</option>
            </select>
        </div>
        <div class="field">
            <label class="label" for="levelFilter">等级</label>
            <select class="control" id="levelFilter">
                <option value="">全部</option>
                <option value="优质模特">优质模特</option>
                <option value="较为配合模特">较为配合模特</option>
                <option value="普通模特">普通模特</option>
                <option value="拍摄时间长">拍摄时间长</option>
                <option value="正在磨合">正在磨合</option>
            </select>
        </div>
        <div class="field">
            <label class="label">排队人数</label>
            <div class="segmented" id="queueSegment">
                <button type="button" class="active" data-value="">全部</button>
                <button type="button" data-value="has">有排队</button>
                <button type="button" data-value="none">无排队</button>
            </div>
        </div>
        <div class="field">
            <label class="label">范围</label>
            <div class="segmented" id="mineSegment">
                <button type="button" class="active" data-value="">全部</button>
                <button type="button" data-value="1">只看我</button>
            </div>
        </div>
        <button class="btn" type="button" id="resetBtn"><i class="fas fa-rotate-right"></i> 重置</button>
    </section>

    <main class="layout">
        <section class="panel">
            <div class="panel-head">
                <div class="panel-title"><i class="fas fa-layer-group"></i> 模特列表</div>
                <div class="result-count" id="resultCount">加载中</div>
            </div>
            <div class="model-list" id="modelList">
                <div class="loading">正在加载模特列表...</div>
            </div>
            <div class="list-footer">
                <div class="page-info" id="pageInfo"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </section>

        <aside class="panel detail-panel">
            <div class="detail-media" id="detailMedia">
                <div class="play"><i class="fas fa-play"></i></div>
            </div>
            <div class="detail-body" id="detailBody">
                <div class="empty">请选择一个模特</div>
            </div>
        </aside>
    </main>
</div>
<div class="toast" id="toast"></div>

<script>
const state = {
    page: 1,
    perPage: 10,
    total: 0,
    totalPages: 0,
    sort: 'queue_count_desc',
    name: '',
    responsible: '',
    status: '',
    country: '',
    level: '',
    queueFilter: '',
    mineOnly: false,
    selectedId: null,
    rows: [],
    loading: false
};

let toastTimer = null;

function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function escAttr(value) {
    return esc(value).replace(/`/g, '&#96;');
}

function buildQueryString(params) {
    const usp = new URLSearchParams();
    Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== '') {
            usp.append(key, String(value));
        }
    });
    return usp.toString();
}

function firstVideo(row) {
    const videos = String(row?.videos || '').split(';').map(v => v.trim()).filter(Boolean);
    return videos[0] || '';
}

function videoUrl(name) {
    return `/model/videos/${encodeURIComponent(name)}`;
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message || '';
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

function statusClass(status) {
    return status === '暂停拍摄' ? 'paused' : '';
}

function levelClass(level) {
    if (level === '优质模特') return 'good';
    if (level === '正在磨合' || level === '拍摄时间长') return 'warn';
    return 'blue';
}

function queueText(row) {
    const count = Number(row?.queueing_count || 0);
    const position = row?.position_for_current;
    if (count <= 0) return '暂无排队';
    if (row?.has_mine_pending && position === 0) return '我已到号';
    if (row?.has_mine_pending && position !== null && position !== undefined) return `我前面 ${position} 位`;
    return `${count} 人排队中`;
}

function renderMetrics() {
    const pageQueued = state.rows.reduce((sum, row) => sum + Number(row.queueing_count || 0), 0);
    const mineCount = state.rows.filter(row => row.has_mine_pending).length;
    const fastest = state.rows
        .filter(row => row.has_mine_pending && row.position_for_current !== null && row.position_for_current !== undefined)
        .reduce((min, row) => Math.min(min, Number(row.position_for_current || 0)), 9999);
    document.getElementById('metricQueued').textContent = pageQueued;
    document.getElementById('metricMine').textContent = mineCount;
    document.getElementById('metricTotal').textContent = state.total;
    document.getElementById('metricFastest').textContent = fastest === 9999 ? '-' : fastest;
}

function renderMedia(row) {
    const name = firstVideo(row);
    if (!name) {
        return `<div class="empty-video"><div class="play"><i class="fas fa-video-slash"></i></div></div>`;
    }
    return `<video src="${escAttr(videoUrl(name))}" controls preload="metadata" playsinline></video>`;
}

function setCardMediaShape(video) {
    const card = video.closest('.model-card');
    if (!card || !video.videoWidth || !video.videoHeight) return;
    card.classList.add('media-ready');
    card.classList.remove('media-portrait', 'media-square', 'media-landscape');
    const ratio = video.videoWidth / video.videoHeight;
    if (ratio < 0.8) {
        card.classList.add('media-portrait');
    } else if (ratio > 1.2) {
        card.classList.add('media-landscape');
    } else {
        card.classList.add('media-square');
    }
}

function activateCardMediaSizing() {
    document.querySelectorAll('.model-card .media video').forEach(video => {
        if (video.readyState >= 1) {
            setCardMediaShape(video);
            return;
        }
        video.addEventListener('loadedmetadata', () => setCardMediaShape(video), { once: true });
    });
}

function renderList() {
    const list = document.getElementById('modelList');
    document.getElementById('resultCount').textContent = `共 ${state.total} 位`;
    renderMetrics();
    if (state.loading) {
        list.innerHTML = '<div class="loading">正在加载模特列表...</div>';
        return;
    }
    if (!state.rows.length) {
        list.innerHTML = '<div class="empty">没有符合条件的模特</div>';
        renderDetail(null);
        return;
    }
    if (!state.rows.some(row => Number(row.id) === Number(state.selectedId))) {
        state.selectedId = state.rows[0].id;
    }
    list.innerHTML = state.rows.map(row => {
        const isActive = Number(row.id) === Number(state.selectedId);
        const disabled = row.status === '暂停拍摄';
        return `
            <article class="model-card${isActive ? ' active' : ''}" tabindex="0" data-model-id="${escAttr(row.id)}">
                <div class="media">${renderMedia(row)}</div>
                <div class="card-body">
                    <div class="model-line">
                        <div class="model-name">${esc(row.name || '未命名模特')}</div>
                        <div class="model-code">${esc(row.code || '')}</div>
                    </div>
                    <div class="chips">
                        <span class="chip ${levelClass(row.level)}"><i class="fas fa-star"></i>${esc(row.level || '未分级')}</span>
                        <span class="chip"><i class="fas fa-location-dot"></i>${esc(row.country || '未填写')}</span>
                        <span class="chip"><i class="fas fa-user"></i>${esc(row.uploader || '无负责人')}</span>
                    </div>
                    <div class="queue-strip">
                        <div>
                            <div class="queue-main">${esc(queueText(row))}</div>
                            <div class="queue-sub">${esc(row.status || '未填写')} · ${esc(row.remark || '暂无备注')}</div>
                        </div>
                        <button class="mini-action ${row.has_mine_pending ? 'cancel' : ''}" type="button" data-action="${row.has_mine_pending ? 'cancel' : 'enqueue'}" data-model-id="${escAttr(row.id)}" ${disabled ? 'disabled' : ''} aria-label="${row.has_mine_pending ? '取消排队' : '排队'}">
                            <i class="fas ${row.has_mine_pending ? 'fa-times' : 'fa-plus'}"></i>
                        </button>
                    </div>
                </div>
            </article>
        `;
    }).join('');
    activateCardMediaSizing();
    bindCards();
    renderDetail(state.rows.find(row => Number(row.id) === Number(state.selectedId)));
}

function bindCards() {
    document.querySelectorAll('.model-card').forEach(card => {
        card.addEventListener('click', event => {
            const action = event.target.closest('[data-action]');
            if (action) {
                event.stopPropagation();
                const id = Number(action.dataset.modelId);
                if (action.dataset.action === 'enqueue') enqueue(id, action);
                if (action.dataset.action === 'cancel') cancelQueue(id, action);
                return;
            }
            state.selectedId = Number(card.dataset.modelId);
            renderList();
        });
        card.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                state.selectedId = Number(card.dataset.modelId);
                renderList();
            }
        });
    });
}

function renderDetailMedia(row) {
    const media = document.getElementById('detailMedia');
    const name = firstVideo(row);
    if (!row || !name) {
        media.innerHTML = '<div class="play"><i class="fas fa-play"></i></div>';
        return;
    }
    media.innerHTML = `<video src="${escAttr(videoUrl(name))}" controls preload="metadata" playsinline></video>`;
}

function renderDetail(row) {
    const body = document.getElementById('detailBody');
    renderDetailMedia(row);
    if (!row) {
        body.innerHTML = '<div class="empty">请选择一个模特</div>';
        return;
    }
    body.innerHTML = `
        <div class="detail-title-row">
            <div>
                <h2 class="detail-name">${esc(row.name || '未命名模特')}</h2>
                <div class="detail-code">${esc(row.code || '')}</div>
            </div>
            <div class="status-pill ${statusClass(row.status)}"><i class="fas fa-circle"></i>${esc(row.status || '未填写')}</div>
        </div>
        <div class="detail-grid">
            <div class="detail-cell">
                <div class="cell-label">负责人</div>
                <div class="cell-value">${esc(row.uploader || '未填写')}</div>
            </div>
            <div class="detail-cell">
                <div class="cell-label">国家</div>
                <div class="cell-value">${esc(row.country || '未填写')}</div>
            </div>
            <div class="detail-cell">
                <div class="cell-label">等级</div>
                <div class="cell-value">${esc(row.level || '未填写')}</div>
            </div>
            <div class="detail-cell">
                <div class="cell-label">队列</div>
                <div class="cell-value">${esc(queueText(row))}</div>
            </div>
        </div>
        <div class="remark">${esc(row.remark || '暂无备注')}</div>
        <div class="queue-box">
            <div class="queue-box-head">
                <span>当前队列</span>
                <span>${Number(row.queueing_count || 0)} 人</span>
            </div>
            <div class="timeline" id="queueTimeline">
                <div class="operator-note">正在读取队列...</div>
            </div>
        </div>
        <div class="detail-actions">
            <button class="btn primary" type="button" id="detailEnqueueBtn" ${row.has_mine_pending || row.status === '暂停拍摄' ? 'disabled' : ''}>
                <i class="fas ${row.has_mine_pending ? 'fa-check' : 'fa-plus'}"></i>${row.has_mine_pending ? '已排队' : '立即排队'}
            </button>
            <button class="btn danger" type="button" id="detailCancelBtn" ${!row.has_mine_pending ? 'disabled' : ''}>
                <i class="fas fa-times"></i>取消排队
            </button>
        </div>
    `;
    document.getElementById('detailEnqueueBtn')?.addEventListener('click', event => enqueue(row.id, event.currentTarget));
    document.getElementById('detailCancelBtn')?.addEventListener('click', event => cancelQueue(row.id, event.currentTarget));
    loadQueueDetail(row.id);
}

function renderQueueRows(items) {
    const timeline = document.getElementById('queueTimeline');
    if (!timeline) return;
    if (!items.length) {
        timeline.innerHTML = '<div class="operator-note">当前无人排队</div>';
        return;
    }
    timeline.innerHTML = items.map((item, index) => {
        const proxy = item.proxy_queue ? ` · 代排队：${esc(item.proxy_queue)}` : '';
        const note = item.remark ? esc(item.remark) : esc(item.queue_status || '排队中');
        return `
            <div class="timeline-row">
                <div class="rank">${index + 1}</div>
                <div class="operator">
                    <div class="operator-name">${esc(item.department || item.creator || '未填写')}</div>
                    <div class="operator-note">${note}${proxy}</div>
                </div>
                ${item.creator ? `<div class="current-tag">${esc(item.creator)}</div>` : ''}
            </div>
        `;
    }).join('');
}

async function loadQueueDetail(modelId) {
    try {
        const res = await fetch(`/api/model_queue/${modelId}`);
        const payload = await res.json();
        if (!payload.success) {
            renderQueueRows([]);
            return;
        }
        renderQueueRows(payload.data || []);
    } catch (error) {
        const timeline = document.getElementById('queueTimeline');
        if (timeline) timeline.innerHTML = '<div class="operator-note">队列读取失败</div>';
    }
}

function renderPagination() {
    const pageInfo = document.getElementById('pageInfo');
    const pagination = document.getElementById('pagination');
    if (!state.total) {
        pageInfo.textContent = '';
        pagination.innerHTML = '';
        return;
    }
    const start = (state.page - 1) * state.perPage + 1;
    const end = Math.min(state.total, state.page * state.perPage);
    pageInfo.textContent = `第 ${state.page}/${state.totalPages || 1} 页，共 ${state.total} 条（${start}-${end}）`;

    if ((state.totalPages || 0) <= 1) {
        pagination.innerHTML = '';
        return;
    }

    const items = [];
    const add = (label, page, disabled, active) => {
        items.push(`<button class="page-btn${active ? ' active' : ''}" type="button" data-page="${page}" ${disabled ? 'disabled' : ''}>${label}</button>`);
    };
    add('上一页', Math.max(1, state.page - 1), state.page <= 1, false);
    const maxButtons = 5;
    let startPage = Math.max(1, state.page - Math.floor(maxButtons / 2));
    let endPage = Math.min(state.totalPages, startPage + maxButtons - 1);
    startPage = Math.max(1, endPage - maxButtons + 1);
    for (let page = startPage; page <= endPage; page++) {
        add(String(page), page, false, page === state.page);
    }
    add('下一页', Math.min(state.totalPages, state.page + 1), state.page >= state.totalPages, false);
    pagination.innerHTML = items.join('');
    pagination.querySelectorAll('[data-page]').forEach(button => {
        button.addEventListener('click', () => loadPage(Number(button.dataset.page), true));
    });
}

async function loadPage(page = 1, keepSelection = false) {
    state.page = page;
    state.loading = true;
    renderList();
    const qs = buildQueryString({
        page: state.page,
        per_page: state.perPage,
        sort: state.sort,
        name: state.name,
        responsible: state.responsible,
        status: state.status,
        country: state.country,
        level: state.level,
        queue_filter: state.queueFilter,
        mine_only: state.mineOnly ? '1' : ''
    });
    try {
        const res = await fetch(`/api/model_queue_overview?${qs}`);
        const payload = await res.json();
        if (!payload.success) {
            throw new Error(payload.message || '加载失败');
        }
        state.rows = payload.data || [];
        state.total = payload.total || 0;
        state.totalPages = payload.total_pages || 0;
        state.page = payload.page || state.page;
        state.perPage = payload.per_page || state.perPage;
        if (!keepSelection || !state.rows.some(row => Number(row.id) === Number(state.selectedId))) {
            state.selectedId = state.rows[0]?.id ?? null;
        }
    } catch (error) {
        state.rows = [];
        state.total = 0;
        state.totalPages = 0;
        showToast(error.message || '加载失败');
    } finally {
        state.loading = false;
        renderList();
        renderPagination();
    }
}

async function enqueue(modelId, button) {
    if (!modelId || button?.disabled) return;
    const oldHtml = button ? button.innerHTML : '';
    if (button) {
        button.disabled = true;
        button.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    }
    try {
        const res = await fetch('/api/model_queue', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({model_id: modelId})
        });
        const payload = await res.json();
        if (!payload.success) throw new Error(payload.message || '预约失败');
        showToast('排队成功');
        state.selectedId = modelId;
        await loadPage(state.page, true);
    } catch (error) {
        showToast(error.message || '预约失败');
        if (button) {
            button.disabled = false;
            button.innerHTML = oldHtml;
        }
    }
}

async function cancelQueue(modelId, button) {
    if (!modelId || button?.disabled) return;
    const oldHtml = button ? button.innerHTML : '';
    if (button) {
        button.disabled = true;
        button.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    }
    try {
        const res = await fetch(`/api/model_queue/${modelId}/cancel_mine`, {method: 'POST'});
        const payload = await res.json();
        if (!payload.success) throw new Error(payload.message || '操作失败');
        showToast('取消排队成功');
        state.selectedId = modelId;
        await loadPage(state.page, true);
    } catch (error) {
        showToast(error.message || '操作失败');
        if (button) {
            button.disabled = false;
            button.innerHTML = oldHtml;
        }
    }
}

function bindFilters() {
    const nameInput = document.getElementById('nameFilter');
    const responsibleInput = document.getElementById('responsibleFilter');
    nameInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            state.name = nameInput.value.trim();
            loadPage(1);
        }
    });
    responsibleInput.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            state.responsible = responsibleInput.value.trim();
            loadPage(1);
        }
    });
    nameInput.addEventListener('blur', () => {
        const value = nameInput.value.trim();
        if (value !== state.name) {
            state.name = value;
            loadPage(1);
        }
    });
    responsibleInput.addEventListener('blur', () => {
        const value = responsibleInput.value.trim();
        if (value !== state.responsible) {
            state.responsible = value;
            loadPage(1);
        }
    });
    document.getElementById('sortSelect').addEventListener('change', event => {
        state.sort = event.target.value || 'queue_count_desc';
        loadPage(1);
    });
    document.getElementById('statusFilter').addEventListener('change', event => {
        state.status = event.target.value || '';
        loadPage(1);
    });
    document.getElementById('countryFilter').addEventListener('change', event => {
        state.country = event.target.value || '';
        loadPage(1);
    });
    document.getElementById('levelFilter').addEventListener('change', event => {
        state.level = event.target.value || '';
        loadPage(1);
    });
    document.querySelectorAll('#queueSegment button').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('#queueSegment button').forEach(item => item.classList.remove('active'));
            button.classList.add('active');
            state.queueFilter = button.dataset.value || '';
            loadPage(1);
        });
    });
    document.querySelectorAll('#mineSegment button').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('#mineSegment button').forEach(item => item.classList.remove('active'));
            button.classList.add('active');
            state.mineOnly = button.dataset.value === '1';
            loadPage(1);
        });
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        state.sort = 'queue_count_desc';
        state.name = '';
        state.responsible = '';
        state.status = '';
        state.country = '';
        state.level = '';
        state.queueFilter = '';
        state.mineOnly = false;
        nameInput.value = '';
        responsibleInput.value = '';
        document.getElementById('sortSelect').value = state.sort;
        document.getElementById('statusFilter').value = '';
        document.getElementById('countryFilter').value = '';
        document.getElementById('levelFilter').value = '';
        document.querySelectorAll('#queueSegment button').forEach(item => item.classList.toggle('active', item.dataset.value === ''));
        document.querySelectorAll('#mineSegment button').forEach(item => item.classList.toggle('active', item.dataset.value === ''));
        loadPage(1);
    });
    document.getElementById('refreshBtn').addEventListener('click', () => loadPage(state.page, true));
}

bindFilters();
loadPage(1);
</script>
</body>
</html>
