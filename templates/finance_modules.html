    <script>
        function _logMenuClick(menu, href) {
            const payload = JSON.stringify({ menu: menu || '', href: href || '' });
            try {
                if (navigator.sendBeacon) {
                    const blob = new Blob([payload], { type: 'application/json' });
                    navigator.sendBeacon('/api/menu_click', blob);
                    return;
                }
            } catch (e) {}
            try {
                fetch('/api/menu_click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload,
                    keepalive: true
                }).catch(() => {});
            } catch (e) {}
        }

        document.addEventListener('click', function (e) {
            const btn = e.target.closest('.module-card button');
            if (!btn) return;
            const card = btn.closest('.module-card');
            const titleEl = card ? card.querySelector('h3') : null;
            const title = (titleEl ? titleEl.textContent : '').trim();
            const action = (btn.textContent || '').trim();
            const menu = (title && action) ? (title + '-' + action) : (title || action);
            if (menu) _logMenuClick(menu, '');
        });

        function loadApprovalTemplatesFinance(){
            fetch('/api/feishu/approvals_finance').then(r=>r.json()).then(j=>{
                if(!j.success) throw new Error(j.message||'拉取审批模板失败');
                const sel = document.getElementById('fApprovalTemplate');
                sel.innerHTML = '<option value="">选择审批模板（可选）</option>' +
                    (j.data||[]).map(it=>`<option value="${it.code}">${it.name||it.code}</option>`).join('');
            }).catch(err=>{ console.warn(err.message||err); });
        }

        function exportApprovalAmountsFinance(){
            const s = document.getElementById('fApprovalStartDate').value;
            const e = document.getElementById('fApprovalEndDate').value;
            const code = document.getElementById('fApprovalTemplate').value;
            const params = new URLSearchParams();
            if(s) params.append('start_date', s);
            if(e) params.append('end_date', e);
            if(code) params.append('approval_code', code);
            params.append('source','feishu');
            const url = '/api/export_approval_amounts_finance' + (params.toString() ? ('?' + params.toString()) : '');
            const btn = event && event.target ? event.target : null;
            const orig = btn ? btn.innerHTML : '';
            if(btn){ btn.disabled = true; btn.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在导出...'; }
            fetch(url).then(r=>{
                if(r.ok) return r.blob();
                return r.json().then(j=>{ throw new Error(j.message||'导出失败'); });
            }).then(blob=>{
                const a = document.createElement('a');
                const u = URL.createObjectURL(blob);
                a.href = u;
                a.download = '飞书审批金额明细.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(u);
            }).catch(err=>{ alert(err.message||'导出失败'); }).finally(()=>{ if(btn){ btn.disabled = false; btn.innerHTML = orig; } });
        }
        document.addEventListener('DOMContentLoaded', loadApprovalTemplatesFinance);

        function exportExpenseSheetFinance(){
            const btn = event && event.target ? event.target : null;
            const orig = btn ? btn.innerHTML : '';
            if(btn){ btn.disabled = true; btn.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在导出...'; }
            fetch('/api/finance/export_expense_sheet').then(r=>{
                if(r.ok) return r.blob();
                return r.json().then(j=>{ throw new Error(j.message||'导出失败'); });
            }).then(blob=>{
                const a = document.createElement('a');
                const u = URL.createObjectURL(blob);
                a.href = u;
                a.download = '费用明细.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(u);
            }).catch(err=>{
                alert(err.message||'导出失败');
            }).finally(()=>{
                if(btn){ btn.disabled = false; btn.innerHTML = orig; }
            });
        }

        function exportFreightFinance(){
            const s = document.getElementById('freightStartDate').value;
            const e = document.getElementById('freightEndDate').value;
            const stores = document.getElementById('freightStores').value;
            if(!s || !e){
                alert('请先选择开始和结束日期');
                return;
            }
            const params = new URLSearchParams();
            params.append('start_date', s);
            params.append('end_date', e);
            if(stores && stores.trim()){
                params.append('stores', stores.trim());
            }
            const url = '/api/finance/export_freight' + (params.toString() ? ('?' + params.toString()) : '');
            const btn = event && event.target ? event.target : null;
            const orig = btn ? btn.innerHTML : '';
            if(btn){ btn.disabled = true; btn.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在导出...'; }
            fetch(url).then(r=>{
                if(r.ok) return r.blob();
                return r.json().then(j=>{ throw new Error(j.message||'导出失败'); });
            }).then(blob=>{
                const a = document.createElement('a');
                const u = URL.createObjectURL(blob);
                a.href = u;
                a.download = '物流运费结算明细.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(u);
            }).catch(err=>{
                alert(err.message||'导出失败');
            }).finally(()=>{
                if(btn){ btn.disabled = false; btn.innerHTML = orig; }
            });
        }

        function importExpenseSheetFinance(){
            const fileInput = document.getElementById('expenseFile');
            if(!fileInput.files || !fileInput.files[0]){ alert('请先选择Excel文件'); return; }
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            const btn = event && event.target ? event.target : null;
            const orig = btn ? btn.innerHTML : '';
            if(btn){ btn.disabled = true; btn.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在导入...'; }
            fetch('/api/finance/import_expense_sheet', { method:'POST', body: fd }).then(r=>r.json()).then(j=>{
                const box = document.getElementById('expenseImportResult');
                if(j.success){
                    const errHtml = (j.errors && j.errors.length) ? ('<br>失败详情：<br>' + j.errors.map(e=>('<div style="color:#c00;">'+e+'</div>')).join('')) : '';
                    box.innerHTML = '导入完成：' + (j.message || ('成功 ' + j.inserted + ' 条')) + errHtml;
                }else{
                    box.innerHTML = '<span style="color:#c00;">导入失败：' + (j.message||'未知错误') + '</span>';
                }
            }).catch(err=>{
                alert(err.message||'导入失败');
            }).finally(()=>{ if(btn){ btn.disabled = false; btn.innerHTML = orig; } });
        }

            if(!fileInput.files || !fileInput.files[0]){ alert('请先选择Excel文件'); return; }

            fetch('/api/finance/import_wage_rent', { method:'POST', body: fd }).then(r=>r.json()).then(j=>{

                    box.innerHTML = '导入完成：' + (j.message || ('新增 ' + j.inserted + ' 条，更新 ' + j.updated + ' 条')) + errHtml;
                }else{
                    box.innerHTML = '<span style="color:#c00;">导入失败：' + (j.message||'未知错误') + '</span>';
                }
            }).catch(err=>{
                alert(err.message||'导入失败');
            }).finally(()=>{ if(btn){ btn.disabled = false; btn.innerHTML = orig; } });
        }
        function importAllocationRatioFinance(){
            const fileInput = document.getElementById('allocationFile');
            if(!fileInput.files || !fileInput.files[0]){ alert('请先选择Excel文件'); return; }
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            const btn = event && event.target ? event.target : null;
            const orig = btn ? btn.innerHTML : '';
            if(btn){ btn.disabled = true; btn.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在导入...'; }
            fetch('/api/finance/import_allocation_ratio', { method:'POST', body: fd }).then(r=>r.json()).then(j=>{
                const box = document.getElementById('allocationImportResult');
                if(j.success){
                    const errHtml = (j.errors && j.errors.length) ? ('<br>失败详情：<br>' + j.errors.map(e=>('<div style="color:#c00;">'+e+'</div>')).join('')) : '';
                    box.innerHTML = '导入完成：' + (j.message || ('新增 ' + j.inserted + ' 条')) + errHtml;
                }else{
                    box.innerHTML = '<span style="color:#c00;">导入失败：' + (j.message||'未知错误') + '</span>';
                }
            }).catch(err=>{
                alert(err.message||'导入失败');
            }).finally(()=>{ if(btn){ btn.disabled = false; btn.innerHTML = orig; } });
        }
