<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能监控 - 图创AI系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .performance-card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .performance-card:hover {
            transform: translateY(-5px);
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .metric-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .cache-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .cache-active {
            background-color: #d4edda;
            color: #155724;
        }
        .cache-inactive {
            background-color: #f8d7da;
            color: #721c24;
        }
        .preload-timeline {
            position: relative;
            padding-left: 2rem;
        }
        .preload-timeline::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #007bff, #28a745);
        }
        .timeline-item {
            position: relative;
            margin-bottom: 1rem;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1.75rem;
            top: 0.5rem;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #007bff;
        }
        .timeline-item.completed::before {
            background: #28a745;
        }
    </style>
    <link href="{{ url_for('static', filename='css/unified_theme.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-chart-line me-2"></i>图创AI系统 - 性能监控
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">
                    <i class="fas fa-home me-1"></i>返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 性能概览 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="performance-card card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="fas fa-tachometer-alt me-2"></i>性能概览
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-3">
                                <div class="metric-value text-success" id="dashboard-load-time">-</div>
                                <div class="metric-label">仪表盘加载时间 (ms)</div>
                            </div>
                            <div class="col-md-3">
                                <div class="metric-value text-info" id="cache-hit-rate">-</div>
                                <div class="metric-label">缓存命中率 (%)</div>
                            </div>
                            <div class="col-md-3">
                                <div class="metric-value text-warning" id="api-calls-saved">-</div>
                                <div class="metric-label">节省API调用次数</div>
                            </div>
                            <div class="col-md-3">
                                <div class="metric-value text-primary" id="performance-improvement">-</div>
                                <div class="metric-label">性能提升倍数</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 缓存状态 -->
            <div class="col-md-6 mb-4">
                <div class="performance-card card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">
                            <i class="fas fa-database me-2"></i>缓存状态
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="cache-stats-container">
                            <div class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <button class="btn btn-outline-danger btn-sm" onclick="clearCache()">
                                <i class="fas fa-trash me-1"></i>清空缓存
                            </button>
                            <button class="btn btn-outline-primary btn-sm ms-2" onclick="refreshStats()">
                                <i class="fas fa-refresh me-1"></i>刷新统计
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 预加载状态 -->
            <div class="col-md-6 mb-4">
                <div class="performance-card card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">
                            <i class="fas fa-rocket me-2"></i>预加载状态
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="preload-info-container">
                            <div class="text-center">
                                <div class="spinner-border text-success" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 性能测试 -->
        <div class="row">
            <div class="col-12">
                <div class="performance-card card">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0">
                            <i class="fas fa-stopwatch me-2"></i>性能测试
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6>仪表盘加载测试</h6>
                                <button class="btn btn-primary" onclick="testDashboardLoad()">
                                    <i class="fas fa-play me-1"></i>测试仪表盘加载
                                </button>
                                <div id="dashboard-test-result" class="mt-2"></div>
                            </div>
                            <div class="col-md-6">
                                <h6>权限检查测试</h6>
                                <button class="btn btn-success" onclick="testPermissionCheck()">
                                    <i class="fas fa-shield-alt me-1"></i>测试权限检查
                                </button>
                                <div id="permission-test-result" class="mt-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 获取缓存统计信息
        async function loadCacheStats() {
            try {
                const response = await fetch('/api/cache/stats');
                const data = await response.json();
                
                if (data.success) {
                    displayCacheStats(data.data.cache_stats);
                    displayPreloadInfo(data.data.preload_info);
                    updatePerformanceMetrics(data.data);
                } else {
                    document.getElementById('cache-stats-container').innerHTML = 
                        `<div class="alert alert-danger">${data.message}</div>`;
                }
            } catch (error) {
                document.getElementById('cache-stats-container').innerHTML = 
                    `<div class="alert alert-danger">加载失败: ${error.message}</div>`;
            }
        }

        // 显示缓存统计
        function displayCacheStats(stats) {
            let html = '';
            
            // 用户部门缓存
            if (stats.user_departments_cache) {
                const cache = stats.user_departments_cache;
                html += `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>用户部门缓存</span>
                        <span class="cache-status ${cache.valid > 0 ? 'cache-active' : 'cache-inactive'}">
                            ${cache.valid}/${cache.total}
                        </span>
                    </div>
                `;
            }
            
            // 部门信息缓存
            if (stats.department_info_cache) {
                const cache = stats.department_info_cache;
                html += `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>部门信息缓存</span>
                        <span class="cache-status ${cache.valid > 0 ? 'cache-active' : 'cache-inactive'}">
                            ${cache.valid}/${cache.total}
                        </span>
                    </div>
                `;
            }
            
            // 用户信息缓存
            if (stats.user_info_cache) {
                const cache = stats.user_info_cache;
                html += `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span>用户信息缓存</span>
                        <span class="cache-status ${cache.valid > 0 ? 'cache-active' : 'cache-inactive'}">
                            ${cache.valid}/${cache.total}
                        </span>
                    </div>
                `;
            }
            
            // 访问令牌缓存
            html += `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span>访问令牌缓存</span>
                    <span class="cache-status ${stats.access_token_cached ? 'cache-active' : 'cache-inactive'}">
                        ${stats.access_token_cached ? '已缓存' : '未缓存'}
                    </span>
                </div>
            `;
            
            document.getElementById('cache-stats-container').innerHTML = html;
        }

        // 显示预加载信息
        function displayPreloadInfo(preloadInfo) {
            let html = '';
            
            if (preloadInfo.has_preloaded_data) {
                const preloadTime = new Date(preloadInfo.preload_time * 1000);
                html = `
                    <div class="preload-timeline">
                        <div class="timeline-item completed">
                            <strong>预加载完成</strong><br>
                            <small class="text-muted">时间: ${preloadTime.toLocaleString()}</small>
                        </div>
                        <div class="timeline-item completed">
                            <strong>功能权限</strong><br>
                            <small class="text-muted">已缓存 ${preloadInfo.preloaded_functions_count} 个功能</small>
                        </div>
                        <div class="timeline-item completed">
                            <strong>部门信息</strong><br>
                            <small class="text-muted">已缓存 ${preloadInfo.preloaded_departments_count} 个部门</small>
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        暂无预加载数据，请重新登录以启用预加载功能
                    </div>
                `;
            }
            
            document.getElementById('preload-info-container').innerHTML = html;
        }

        // 更新性能指标
        function updatePerformanceMetrics(data) {
            // 这里可以根据实际数据计算性能指标
            const cacheStats = data.cache_stats;
            const preloadInfo = data.preload_info;
            
            // 计算缓存命中率
            let totalCache = 0;
            let validCache = 0;
            
            if (cacheStats.user_departments_cache) {
                totalCache += cacheStats.user_departments_cache.total;
                validCache += cacheStats.user_departments_cache.valid;
            }
            if (cacheStats.department_info_cache) {
                totalCache += cacheStats.department_info_cache.total;
                validCache += cacheStats.department_info_cache.valid;
            }
            if (cacheStats.user_info_cache) {
                totalCache += cacheStats.user_info_cache.total;
                validCache += cacheStats.user_info_cache.valid;
            }
            
            const hitRate = totalCache > 0 ? Math.round((validCache / totalCache) * 100) : 0;
            document.getElementById('cache-hit-rate').textContent = hitRate;
            
            // 预估节省的API调用次数
            const savedCalls = validCache;
            document.getElementById('api-calls-saved').textContent = savedCalls;
            
            // 性能提升倍数（基于缓存命中）
            const improvement = hitRate > 0 ? Math.round(100 / (100 - hitRate)) : 1;
            document.getElementById('performance-improvement').textContent = improvement + 'x';
        }

        // 清空缓存
        async function clearCache() {
            if (!confirm('确定要清空所有缓存吗？这将导致下次访问时重新加载数据。')) {
                return;
            }
            
            try {
                const response = await fetch('/api/cache/clear');
                const data = await response.json();
                
                if (data.success) {
                    alert('缓存已清空');
                    loadCacheStats();
                } else {
                    alert('清空缓存失败: ' + data.message);
                }
            } catch (error) {
                alert('清空缓存失败: ' + error.message);
            }
        }

        // 刷新统计
        function refreshStats() {
            loadCacheStats();
        }

        // 测试仪表盘加载
        async function testDashboardLoad() {
            const startTime = performance.now();
            const resultDiv = document.getElementById('dashboard-test-result');
            
            resultDiv.innerHTML = '<div class="spinner-border spinner-border-sm text-primary" role="status"></div> 测试中...';
            
            try {
                const response = await fetch('/dashboard');
                const endTime = performance.now();
                const loadTime = Math.round(endTime - startTime);
                
                document.getElementById('dashboard-load-time').textContent = loadTime;
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="alert alert-success">✅ 加载成功，耗时 ${loadTime}ms</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-warning">⚠️ 响应异常，状态码: ${response.status}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ 测试失败: ${error.message}</div>`;
            }
        }

        // 测试权限检查
        async function testPermissionCheck() {
            const startTime = performance.now();
            const resultDiv = document.getElementById('permission-test-result');
            
            resultDiv.innerHTML = '<div class="spinner-border spinner-border-sm text-success" role="status"></div> 测试中...';
            
            try {
                const response = await fetch('/api/user/permissions');
                const endTime = performance.now();
                const loadTime = Math.round(endTime - startTime);
                const data = await response.json();
                
                if (data.success) {
                    const funcCount = data.data.accessible_functions.length;
                    resultDiv.innerHTML = `<div class="alert alert-success">✅ 权限检查成功，耗时 ${loadTime}ms，可访问 ${funcCount} 个功能</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-warning">⚠️ ${data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ 测试失败: ${error.message}</div>`;
            }
        }

        // 页面加载时获取统计信息
        document.addEventListener('DOMContentLoaded', function() {
            loadCacheStats();
            
            // 每30秒自动刷新一次
            setInterval(loadCacheStats, 30000);
        });
    </script>
</body>
</html>
