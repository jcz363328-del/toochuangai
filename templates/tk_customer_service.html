<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK客服</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background:#f2f2f7; color:#1c1c1e; }
        .page-container { width: calc(100vw - 24px); max-width: none; padding-left:12px; padding-right:12px; }
        .header-card { background:rgba(255,255,255,0.92); border:1px solid #e5e7eb; border-radius:18px; padding:14px 16px; margin-top:16px; box-shadow:0 8px 24px rgba(16,24,40,0.06); }
        .table-wrap { background:rgba(255,255,255,0.92); border:1px solid #e5e7eb; border-radius:18px; padding:10px; margin-top:12px; box-shadow:0 8px 24px rgba(16,24,40,0.06); }
        .table { table-layout: fixed; margin-bottom: 0; }
        .table thead th { white-space:nowrap; font-size:12px; font-weight:600; padding:8px 8px; }
        .table tbody td { vertical-align:middle; font-size:12px; padding:8px 8px; color:#2c2c2e; }
        .table td, .table th { border-color:#e9e9ee; }
        .note-input { min-width:160px; border-radius:10px; border-color:#d1d1d6; }
        .status-tip { font-size:12px; color:#6b7280; }
        .ios-search-btn { border-radius:12px; padding:8px 18px; font-weight:600; min-width:100px; }
        .ios-export-btn { border-radius:12px; padding:8px 14px; font-weight:600; min-width:96px; white-space:nowrap; line-height:1.2; display:inline-flex; align-items:center; justify-content:center; }
        .ios-save-btn { border-radius:10px; padding:4px 10px; font-size:12px; font-weight:600; white-space:nowrap; }
        .cell-wrap { word-break: break-word; line-height:1.35; }
        .multiselect { position: relative; }
        .multiselect .dropdown-toggle-shop { width:100%; display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border:1px solid #ced4da; border-radius:10px; background:#fff; cursor:pointer; height:38px; box-sizing:border-box; }
        .multiselect .dropdown-panel { position:absolute; top:42px; left:0; right:0; background:#fff; border:1px solid #ced4da; border-radius:10px; box-shadow:0 10px 20px rgba(0,0,0,0.08); padding:8px; display:none; z-index:15; max-height:240px; overflow:auto; }
        .multiselect .tags { display:none; }
        .multiselect .shop-row { display:flex; align-items:center; gap:8px; padding:3px 2px; font-size:12px; }
        .multiselect .select-all { display:flex; align-items:center; justify-content:flex-start; gap:6px; margin-bottom:6px; font-size:12px; }
        .multiselect #selectAll { width:14px; height:14px; transform: scale(0.85); transform-origin: center; }
        .multiselect .shop-item { width:14px; height:14px; transform: scale(0.85); transform-origin: center; }
        .col-sku { width:70px; }
        .col-address { width:300px; }
        .col-shop { width:46px; }
        .col-id { width:54px; }
        .col-importer { width:88px; }
        .col-import-time { width:150px; }
        .col-order { width:175px; }
        .col-track { width:190px; }
        .col-note { width:210px; }
        .col-ship-time { width:140px; }
        .col-action { width:68px; text-align:center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">
                <i class="fas fa-cube"></i> 图创AI系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('tk_project') }}">
                    <i class="fas fa-project-diagram"></i> 返回内容生产工厂
                </a>
                <a class="nav-link" href="{{ url_for('dashboard') }}">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid page-container">
        <div class="header-card">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h4 class="mb-0"><i class="fas fa-headset"></i> TK客服</h4>
                <div class="status-tip" id="statusText">准备加载数据</div>
            </div>
            <div class="row g-2 mt-1">
                <div class="col-md-2">
                    <label class="form-label">开始日期</label>
                    <input id="startDate" type="date" class="form-control" value="{{ start_date }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">结束日期</label>
                    <input id="endDate" type="date" class="form-control" value="{{ end_date }}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">店铺筛选</label>
                    <div id="shopMultiselect" class="multiselect">
                        <div class="dropdown-toggle-shop" onclick="openShopPanel()">
                            <span>选择店铺</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div id="shopPanel" class="dropdown-panel">
                            <label class="select-all">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)">
                                <span>全选</span>
                            </label>
                            <div id="shopsList"></div>
                        </div>
                        <div id="shopTags" class="tags"></div>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">导入人筛选</label>
                    <input id="importerFilter" type="text" class="form-control" placeholder="支持多个，逗号分隔">
                </div>
                <div class="col-md-2">
                    <label class="form-label">发样订单号</label>
                    <input id="orderNoFilter" type="text" class="form-control" placeholder="支持多个，逗号分隔">
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button class="btn btn-primary ios-search-btn" onclick="loadData()"><i class="fas fa-search"></i> 查询</button>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button class="btn btn-success ios-export-btn" onclick="exportExcel()"><i class="fas fa-file-excel me-1"></i>导出</button>
                </div>
            </div>
        </div>

        <div class="table-wrap">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="col-sku">SKU</th>
                            <th class="col-address">网红地址</th>
                            <th class="col-shop">店铺</th>
                            <th class="col-id">ID</th>
                            <th class="col-importer">导入人</th>
                            <th class="col-import-time">导入时间</th>
                            <th class="col-order">发样订单号</th>
                            <th class="col-track">跟踪号</th>
                            <th class="col-note">客服备注</th>
                            <th class="col-ship-time">发货时间</th>
                            <th class="col-action">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="11" class="text-center text-muted py-4">正在加载...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let rowData = [];
        let selectedShops = [];

        function setStatus(text) {
            const el = document.getElementById('statusText');
            if (el) el.textContent = text || '';
        }

        function tdText(tr, val) {
            const td = document.createElement('td');
            td.className = 'cell-wrap';
            td.textContent = val || '';
            tr.appendChild(td);
        }

        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if (!Array.isArray(items) || items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">暂无数据</td></tr>';
                return;
            }
            items.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tdText(tr, row.SKU);
                tdText(tr, row.wanghongdizhi);
                tdText(tr, row.dian);
                tdText(tr, row.ID);
                tdText(tr, row.DaoRuRen);
                tdText(tr, row.DaoRuShiJian);
                tdText(tr, row.FaYangDingDanHao);
                tdText(tr, row.GenZongHao);

                const tdNote = document.createElement('td');
                const noteInput = document.createElement('input');
                noteInput.type = 'text';
                noteInput.className = 'form-control form-control-sm note-input';
                noteInput.value = row.kefubeizhu || '';
                noteInput.id = 'note_' + idx;
                tdNote.appendChild(noteInput);
                tr.appendChild(tdNote);

                tdText(tr, row.fahuoshijian);

                const tdAction = document.createElement('td');
                const btn = document.createElement('button');
                btn.className = 'btn btn-sm btn-success ios-save-btn';
                btn.innerHTML = '<i class="fas fa-save"></i> 保存';
                btn.onclick = async function () {
                    const val = document.getElementById('note_' + idx).value || '';
                    btn.disabled = true;
                    try {
                        const resp = await fetch('/api/tk_customer_service/update_note', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                FaYangDingDanHao: row.FaYangDingDanHao || '',
                                SKU: row.SKU || '',
                                kefubeizhu: val
                            })
                        });
                        const data = await resp.json();
                        if (data.success) {
                            row.kefubeizhu = val;
                            setStatus('备注已保存');
                        } else {
                            alert(data.message || '保存失败');
                        }
                    } catch (e) {
                        alert('网络错误，保存失败');
                    } finally {
                        btn.disabled = false;
                    }
                };
                tdAction.appendChild(btn);
                tr.appendChild(tdAction);
                tbody.appendChild(tr);
            });
        }

        function getSelectedShops() {
            return Array.from(document.querySelectorAll('.shop-item:checked')).map(cb => cb.value);
        }

        function openShopPanel() {
            const panel = document.getElementById('shopPanel');
            if (panel) panel.style.display = 'block';
        }

        function closeShopPanel() {
            const panel = document.getElementById('shopPanel');
            if (panel) panel.style.display = 'none';
        }

        function updateShopTags() {
            selectedShops = getSelectedShops();
            const tagsBox = document.getElementById('shopTags');
            if (tagsBox) {
                tagsBox.innerHTML = '';
                selectedShops.forEach(s => {
                    const el = document.createElement('span');
                    el.className = 'tag';
                    el.textContent = s;
                    tagsBox.appendChild(el);
                });
            }
            const titleEl = document.querySelector('#shopMultiselect .dropdown-toggle-shop span');
            if (titleEl) titleEl.textContent = selectedShops.length ? ('已选' + selectedShops.length + '个') : '选择店铺';
            const selectAll = document.getElementById('selectAll');
            const allItems = document.querySelectorAll('.shop-item');
            if (selectAll) selectAll.checked = allItems.length > 0 && selectedShops.length === allItems.length;
        }

        function toggleSelectAll(ele) {
            const checked = !!(ele && ele.checked);
            document.querySelectorAll('.shop-item').forEach(cb => { cb.checked = checked; });
            updateShopTags();
        }

        async function loadShops() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            if (!startDate || !endDate) return;
            const prevVals = selectedShops.slice();
            const listBox = document.getElementById('shopsList');
            const selectAll = document.getElementById('selectAll');
            try {
                const url = `/api/tk_customer_service/shops?start_date=${encodeURIComponent(startDate)}&end_date=${encodeURIComponent(endDate)}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (!data.success) return;
                const shops = Array.isArray(data.shops) ? data.shops : [];
                if (!listBox) return;
                listBox.innerHTML = '';
                shops.forEach(shop => {
                    const label = document.createElement('label');
                    label.className = 'shop-row';
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.value = shop;
                    cb.className = 'shop-item';
                    cb.checked = prevVals.includes(shop);
                    cb.addEventListener('change', updateShopTags);
                    const span = document.createElement('span');
                    span.textContent = shop;
                    label.appendChild(cb);
                    label.appendChild(span);
                    listBox.appendChild(label);
                });
                if (selectAll) {
                    selectAll.checked = shops.length > 0 && shops.every(s => prevVals.includes(s));
                }
                updateShopTags();
            } catch (e) {
            }
        }

        async function loadData() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const shops = getSelectedShops();
            const importerRaw = (document.getElementById('importerFilter')?.value || '').trim();
            const importers = importerRaw ? importerRaw.replace(/，/g, ',').split(',').map(x => x.trim()).filter(Boolean) : [];
            const orderRaw = (document.getElementById('orderNoFilter')?.value || '').trim();
            const orderNos = orderRaw ? orderRaw.replace(/，/g, ',').split(',').map(x => x.trim()).filter(Boolean) : [];
            if (!startDate || !endDate) {
                alert('请选择开始日期和结束日期');
                return;
            }
            setStatus('正在加载数据...');
            try {
                const params = new URLSearchParams();
                params.set('start_date', startDate);
                params.set('end_date', endDate);
                shops.forEach(s => params.append('shops', s));
                importers.forEach(s => params.append('importers', s));
                orderNos.forEach(s => params.append('order_nos', s));
                const url = `/api/tk_customer_service/list?${params.toString()}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (!data.success) {
                    alert(data.message || '加载失败');
                    setStatus('加载失败');
                    return;
                }
                rowData = data.items || [];
                renderTable(rowData);
                const shopText = shops.length ? `，已选 ${shops.length} 个店铺` : '';
                const importerText = importers.length ? `，已筛选 ${importers.length} 个导入人` : '';
                const orderText = orderNos.length ? `，已筛选 ${orderNos.length} 个订单号` : '';
                setStatus(`共 ${rowData.length} 条数据${shopText}${importerText}${orderText}`);
            } catch (e) {
                alert('网络错误，加载失败');
                setStatus('加载失败');
            }
        }

        function exportExcel() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const shops = getSelectedShops();
            const importerRaw = (document.getElementById('importerFilter')?.value || '').trim();
            const importers = importerRaw ? importerRaw.replace(/，/g, ',').split(',').map(x => x.trim()).filter(Boolean) : [];
            const orderRaw = (document.getElementById('orderNoFilter')?.value || '').trim();
            const orderNos = orderRaw ? orderRaw.replace(/，/g, ',').split(',').map(x => x.trim()).filter(Boolean) : [];
            if (!startDate || !endDate) {
                alert('请选择开始日期和结束日期');
                return;
            }
            const params = new URLSearchParams();
            params.set('start_date', startDate);
            params.set('end_date', endDate);
            shops.forEach(s => params.append('shops', s));
            importers.forEach(s => params.append('importers', s));
            orderNos.forEach(s => params.append('order_nos', s));
            const url = `/api/tk_customer_service/export?${params.toString()}`;
            window.location.href = url;
        }

        window.addEventListener('DOMContentLoaded', function () {
            loadShops().then(loadData);
            document.getElementById('startDate').addEventListener('change', loadShops);
            document.getElementById('endDate').addEventListener('change', loadShops);
            const ms = document.getElementById('shopMultiselect');
            if (ms) {
                ms.addEventListener('click', function (e) {
                    const panel = document.getElementById('shopPanel');
                    if (panel && !panel.contains(e.target)) openShopPanel();
                });
            }
            window.addEventListener('click', function (e) {
                const msEl = document.getElementById('shopMultiselect');
                const panel = document.getElementById('shopPanel');
                if (msEl && panel && !msEl.contains(e.target)) closeShopPanel();
            });
        });
    </script>
</body>
</html>
