<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假睫毛市场数据分析 - 图创AI系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            padding: 20px;
        }
        .analytics-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            padding: 20px;
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .metric-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .chart-container {
            position: relative;
            height: 400px;
            margin: 20px 0;
        }
        .table-responsive {
            border-radius: 10px;
            overflow: hidden;
        }
        .btn-export {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            color: white;
        }
        .alert-custom {
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .brand-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .brand-item:last-child {
            border-bottom: none;
        }
        .progress-custom {
            height: 8px;
            border-radius: 4px;
        }
    </style>
    <link href="{{ url_for('static', filename='css/unified_theme.css') }}" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <!-- 页面标题 -->
        <div class="analytics-card">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2><i class="fas fa-chart-line me-2"></i>假睫毛市场数据分析</h2>
                    <p class="text-muted mb-0">实时北美和全球假睫毛市场数据监控</p>
                </div>
                <div>
                    <button class="btn btn-export me-2" onclick="refreshData()">
                        <i class="fas fa-sync-alt me-1"></i>刷新数据
                    </button>
                    <button class="btn btn-export" onclick="exportData()">
                        <i class="fas fa-download me-1"></i>导出数据
                    </button>
                </div>
            </div>
        </div>

        <!-- 实时指标卡片 -->
        <div class="row" id="metricsCards">
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-value" id="currentSales">--</div>
                    <div class="metric-label">当前小时销售额 (万美元)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-value" id="dailyCompletion">--%</div>
                    <div class="metric-label">日销售目标完成率</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-value" id="naMarketSize">--</div>
                    <div class="metric-label">北美市场规模 (亿美元)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-value" id="globalMarketSize">--</div>
                    <div class="metric-label">全球市场规模 (亿美元)</div>
                </div>
            </div>
        </div>

        <!-- 市场警报 -->
        <div class="analytics-card">
            <h4><i class="fas fa-bell me-2"></i>市场动态</h4>
            <div id="marketAlerts"></div>
        </div>

        <div class="row">
            <!-- 北美市场数据 -->
            <div class="col-lg-6">
                <div class="analytics-card">
                    <h4><i class="fas fa-flag-usa me-2"></i>北美市场分析</h4>
                    
                    <!-- 销售趋势图 -->
                    <div class="chart-container">
                        <canvas id="naSalesTrendChart"></canvas>
                    </div>
                    
                    <!-- 品牌市场份额 -->
                    <h5 class="mt-4">主要品牌市场份额</h5>
                    <div id="naBrands"></div>
                    
                    <!-- 产品类别分布 -->
                    <h5 class="mt-4">产品类别分布</h5>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="naProductCategoryChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 全球市场数据 -->
            <div class="col-lg-6">
                <div class="analytics-card">
                    <h4><i class="fas fa-globe me-2"></i>全球市场分析</h4>
                    
                    <!-- 地区分布图 -->
                    <div class="chart-container">
                        <canvas id="globalRegionChart"></canvas>
                    </div>
                    
                    <!-- 增长预测 -->
                    <h5 class="mt-4">市场增长预测</h5>
                    <div class="chart-container">
                        <canvas id="growthForecastChart"></canvas>
                    </div>
                    
                    <!-- 消费者画像 -->
                    <h5 class="mt-4">消费者年龄分布</h5>
                    <div class="chart-container" style="height: 250px;">
                        <canvas id="consumerAgeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 热门产品和竞争对手动态 -->
        <div class="row">
            <div class="col-lg-6">
                <div class="analytics-card">
                    <h4><i class="fas fa-fire me-2"></i>热门产品</h4>
                    <div id="trendingProducts"></div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="analytics-card">
                    <h4><i class="fas fa-users me-2"></i>竞争对手动态</h4>
                    <div id="competitorActivity"></div>
                </div>
            </div>
        </div>

        <!-- 详细数据表格 -->
        <div class="analytics-card">
            <h4><i class="fas fa-table me-2"></i>详细数据表格</h4>
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>地区</th>
                            <th>市场规模 (亿美元)</th>
                            <th>市场份额 (%)</th>
                            <th>增长率 (%)</th>
                            <th>主要品牌</th>
                        </tr>
                    </thead>
                    <tbody id="detailDataTable">
                        <!-- 数据将通过JavaScript填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <p class="mt-2">正在加载市场数据...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let marketData = null;
        let charts = {};

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadMarketData();
            loadRealTimeMetrics();
            
            // 每30秒刷新实时指标
            setInterval(loadRealTimeMetrics, 30000);
        });

        // 加载市场数据
        async function loadMarketData() {
            try {
                showLoading(true);
                const response = await fetch('/api/eyelash/market_data');
                const result = await response.json();
                
                if (result.success) {
                    marketData = result.data;
                    updateMarketMetrics();
                    createCharts();
                    updateDetailTable();
                } else {
                    showAlert('danger', '加载市场数据失败: ' + result.message);
                }
            } catch (error) {
                showAlert('danger', '网络错误: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // 加载实时指标
        async function loadRealTimeMetrics() {
            try {
                const response = await fetch('/api/eyelash/real_time_metrics');
                const result = await response.json();
                
                if (result.success) {
                    updateRealTimeMetrics(result.metrics);
                }
            } catch (error) {
                console.error('加载实时指标失败:', error);
            }
        }

        // 更新市场指标
        function updateMarketMetrics() {
            if (!marketData) return;
            
            document.getElementById('naMarketSize').textContent = marketData.north_america.market_size.value;
            document.getElementById('globalMarketSize').textContent = marketData.global.market_size.value;
        }

        // 更新实时指标
        function updateRealTimeMetrics(metrics) {
            document.getElementById('currentSales').textContent = metrics.live_sales.current_hour_sales;
            document.getElementById('dailyCompletion').textContent = metrics.live_sales.completion_rate + '%';
            
            // 更新市场警报
            updateMarketAlerts(metrics.market_alerts);
            
            // 更新热门产品
            updateTrendingProducts(metrics.trending_products);
            
            // 更新竞争对手动态
            updateCompetitorActivity(metrics.competitor_activity);
        }

        // 更新市场警报
        function updateMarketAlerts(alerts) {
            const container = document.getElementById('marketAlerts');
            container.innerHTML = '';
            
            alerts.forEach(alert => {
                const alertClass = alert.type === 'positive' ? 'alert-success' : 
                                 alert.type === 'warning' ? 'alert-warning' : 'alert-info';
                const icon = alert.type === 'positive' ? 'fa-check-circle' : 
                           alert.type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
                
                container.innerHTML += `
                    <div class="alert ${alertClass} alert-custom">
                        <i class="fas ${icon} me-2"></i>${alert.message}
                    </div>
                `;
            });
        }

        // 更新热门产品
        function updateTrendingProducts(products) {
            const container = document.getElementById('trendingProducts');
            container.innerHTML = '';
            
            products.forEach((product, index) => {
                container.innerHTML += `
                    <div class="brand-item">
                        <div>
                            <strong>#${product.rank} ${product.name}</strong>
                            <div class="text-muted small">销量增长</div>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-success">${product.sales_spike}</span>
                        </div>
                    </div>
                `;
            });
        }

        // 更新竞争对手动态
        function updateCompetitorActivity(activities) {
            const container = document.getElementById('competitorActivity');
            container.innerHTML = '';
            
            activities.forEach(activity => {
                const impactColor = activity.impact === 'high' ? 'danger' : 
                                  activity.impact === 'medium' ? 'warning' : 'info';
                
                container.innerHTML += `
                    <div class="brand-item">
                        <div>
                            <strong>${activity.competitor}</strong>
                            <div class="text-muted small">${activity.activity}</div>
                        </div>
                        <div>
                            <span class="badge bg-${impactColor}">${activity.impact}</span>
                        </div>
                    </div>
                `;
            });
        }

        // 创建图表
        function createCharts() {
            if (!marketData) return;
            
            // 北美销售趋势图
            createSalesTrendChart();
            
            // 北美产品类别图
            createProductCategoryChart();
            
            // 全球地区分布图
            createGlobalRegionChart();
            
            // 增长预测图
            createGrowthForecastChart();
            
            // 消费者年龄分布图
            createConsumerAgeChart();
            
            // 更新品牌列表
            updateBrandsList();
        }

        // 北美销售趋势图
        function createSalesTrendChart() {
            const ctx = document.getElementById('naSalesTrendChart').getContext('2d');
            const salesData = marketData.north_america.sales_trends;
            
            if (charts.salesTrend) charts.salesTrend.destroy();
            
            charts.salesTrend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: salesData.map(item => item.month),
                    datasets: [{
                        label: '销售额 (百万美元)',
                        data: salesData.map(item => item.sales),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '北美市场销售趋势'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // 产品类别图
        function createProductCategoryChart() {
            const ctx = document.getElementById('naProductCategoryChart').getContext('2d');
            const categories = marketData.north_america.product_categories;
            
            if (charts.productCategory) charts.productCategory.destroy();
            
            charts.productCategory = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories).map(key => key.replace('_', ' ')),
                    datasets: [{
                        data: Object.values(categories).map(cat => cat.share),
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#f5576c']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '产品类别市场份额'
                        }
                    }
                }
            });
        }

        // 全球地区分布图
        function createGlobalRegionChart() {
            const ctx = document.getElementById('globalRegionChart').getContext('2d');
            const regions = marketData.global.regional_breakdown;
            
            if (charts.globalRegion) charts.globalRegion.destroy();
            
            charts.globalRegion = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: regions.map(region => region.region),
                    datasets: [{
                        label: '市场份额 (%)',
                        data: regions.map(region => region.market_share),
                        backgroundColor: '#667eea'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '全球地区市场分布'
                        }
                    }
                }
            });
        }

        // 增长预测图
        function createGrowthForecastChart() {
            const ctx = document.getElementById('growthForecastChart').getContext('2d');
            const forecast = marketData.global.growth_forecast;
            
            if (charts.growthForecast) charts.growthForecast.destroy();
            
            charts.growthForecast = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: forecast.map(item => item.year),
                    datasets: [{
                        label: '市场规模 (亿美元)',
                        data: forecast.map(item => item.market_size),
                        borderColor: '#764ba2',
                        backgroundColor: 'rgba(118, 75, 162, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '全球市场增长预测'
                        }
                    }
                }
            });
        }

        // 消费者年龄分布图
        function createConsumerAgeChart() {
            const ctx = document.getElementById('consumerAgeChart').getContext('2d');
            const ageGroups = marketData.global.consumer_demographics.age_groups;
            
            if (charts.consumerAge) charts.consumerAge.destroy();
            
            charts.consumerAge = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ageGroups.map(group => group.age),
                    datasets: [{
                        data: ageGroups.map(group => group.percentage),
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '消费者年龄分布'
                        }
                    }
                }
            });
        }

        // 更新品牌列表
        function updateBrandsList() {
            const container = document.getElementById('naBrands');
            const brands = marketData.north_america.top_brands;
            
            container.innerHTML = '';
            
            brands.forEach(brand => {
                container.innerHTML += `
                    <div class="brand-item">
                        <div>
                            <strong>${brand.name}</strong>
                            <div class="text-muted small">收入: $${brand.revenue}M</div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold">${brand.market_share}%</div>
                            <div class="progress progress-custom" style="width: 100px;">
                                <div class="progress-bar" style="width: ${brand.market_share}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 更新详细数据表格
        function updateDetailTable() {
            const tbody = document.getElementById('detailDataTable');
            const regions = marketData.global.regional_breakdown;
            
            tbody.innerHTML = '';
            
            regions.forEach(region => {
                tbody.innerHTML += `
                    <tr>
                        <td>${region.region}</td>
                        <td>${region.revenue}</td>
                        <td>${region.market_share}%</td>
                        <td>+${Math.random() * 10 + 5}%</td>
                        <td>Ardell, Kiss, Eylure</td>
                    </tr>
                `;
            });
        }

        // 刷新数据
        function refreshData() {
            loadMarketData();
            loadRealTimeMetrics();
        }

        // 导出数据
        async function exportData() {
            try {
                const response = await fetch('/api/eyelash/export_data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        data_type: 'all',
                        format: 'json'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const dataStr = JSON.stringify(result.data, null, 2);
                    const dataBlob = new Blob([dataStr], {type: 'application/json'});
                    const url = URL.createObjectURL(dataBlob);
                    
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `eyelash_market_data_${new Date().toISOString().split('T')[0]}.json`;
                    link.click();
                    
                    URL.revokeObjectURL(url);
                    showAlert('success', '数据导出成功！');
                } else {
                    showAlert('danger', '导出失败: ' + result.message);
                }
            } catch (error) {
                showAlert('danger', '导出错误: ' + error.message);
            }
        }

        // 显示加载动画
        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
        }

        // 显示警报
        function showAlert(type, message) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            const container = document.querySelector('.main-container');
            container.insertAdjacentHTML('afterbegin', alertHtml);
            
            // 3秒后自动关闭
            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) {
                    alert.remove();
                }
            }, 3000);
        }
    </script>
</body>
</html>
