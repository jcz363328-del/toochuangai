<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>样板库存管理 - 图创AI系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fb;
            color: #111827;
        }
        button, input, select, textarea { font-family: inherit; }
        .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 206px minmax(0, 1fr);
        }
        .sidebar {
            background: #111827;
            color: #d1d5db;
            padding: 14px 10px;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .brand {
            height: 46px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            color: #fff;
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,.08);
            margin-bottom: 10px;
        }
        .brand i { color: #60a5fa; }
        .nav-btn {
            width: 100%;
            height: 40px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #d1d5db;
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 0 10px;
            margin: 4px 0;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
        }
        .nav-btn i { width: 16px; color: #9ca3af; }
        .nav-btn.active, .nav-btn:hover {
            background: #1f2937;
            color: #fff;
        }
        .nav-btn.active i { color: #60a5fa; }
        .main {
            min-width: 0;
            padding: 14px 18px 22px;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .title-wrap h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.2;
        }
        .title-wrap .sub {
            margin-top: 4px;
            color: #64748b;
            font-size: 12px;
        }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn {
            height: 32px;
            border: 1px solid #dbe3ef;
            background: #fff;
            color: #334155;
            border-radius: 7px;
            padding: 0 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
        .btn.primary:hover { background: #1d4ed8; }
        .btn.green { background: #059669; border-color: #059669; color: #fff; }
        .btn.orange { background: #ea580c; border-color: #ea580c; color: #fff; }
        .btn.red { background: #dc2626; border-color: #dc2626; color: #fff; }
        .btn.small { height: 28px; padding: 0 8px; font-size: 12px; }
        .btn.icon { width: 32px; padding: 0; }
        .section { display: none; }
        .section.active { display: block; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .stat-card {
            background: #fff;
            border: 1px solid #e5ebf3;
            border-radius: 8px;
            padding: 12px;
            min-height: 78px;
        }
        .stat-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .stat-label i { color: #2563eb; }
        .stat-value { font-size: 24px; font-weight: 800; color: #0f172a; }
        .stat-card.warn .stat-label i, .stat-card.warn .stat-value { color: #dc2626; }
        .panel {
            background: #fff;
            border: 1px solid #e5ebf3;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .panel-title {
            margin: 0;
            font-size: 15px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(130px, 1fr));
            gap: 8px;
            align-items: end;
        }
        .filter-grid.flow { grid-template-columns: repeat(5, minmax(140px, 1fr)) auto; }
        .field {
            display: grid;
            gap: 4px;
        }
        .field label {
            font-size: 12px;
            color: #64748b;
            font-weight: 700;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            border: 1px solid #dbe3ef;
            background: #fff;
            border-radius: 7px;
            min-height: 32px;
            padding: 6px 8px;
            font-size: 13px;
            color: #111827;
            outline: none;
        }
        .field textarea {
            min-height: 70px;
            resize: vertical;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        .table-wrap {
            border: 1px solid #e7edf5;
            border-radius: 8px;
            overflow: auto;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 12px;
        }
        th, td {
            border-bottom: 1px solid #eef2f7;
            padding: 8px 9px;
            text-align: left;
            vertical-align: middle;
            white-space: nowrap;
        }
        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #f8fafc;
            color: #334155;
            font-weight: 800;
        }
        td { color: #334155; }
        tbody tr:hover td { background: #f8fbff; }
        tr.low-stock td {
            background: #fff7ed;
        }
        tr.low-stock td.stock-cell {
            color: #c2410c;
            font-weight: 900;
        }
        .muted { color: #94a3b8; }
        .tag-list {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            min-width: 150px;
        }
        .sample-thumb {
            width: 44px;
            height: 44px;
            border-radius: 7px;
            object-fit: cover;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            display: block;
        }
        .photo-preview {
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 12px;
        }
        .photo-preview img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .detail-photo {
            width: min(260px, 100%);
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            margin-bottom: 10px;
        }
        .search-center-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            padding: 4px 2px 12px;
            border-bottom: 1px solid #e5ebf3;
            margin-bottom: 12px;
        }
        .search-center-title {
            margin: 0;
            font-size: 21px;
            font-weight: 900;
            color: #0f172a;
        }
        .search-center-sub {
            margin-top: 5px;
            font-size: 12px;
            color: #64748b;
        }
        .saved-search-box {
            border-left: 2px solid #64748b;
            padding-left: 12px;
        }
        .saved-search-list {
            min-height: 84px;
            border: 1px solid #e5ebf3;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 14px;
        }
        .saved-empty {
            display: grid;
            gap: 6px;
            place-items: center;
            color: #64748b;
            font-size: 13px;
        }
        .saved-empty i { font-size: 22px; color: #64748b; }
        .saved-chip {
            height: 30px;
            border: 1px solid #dbe3ef;
            background: #fff;
            border-radius: 999px;
            padding: 0 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            color: #334155;
        }
        .saved-chip:hover { background: #f8fafc; border-color: #94a3b8; }
        .search-filter-box {
            border-left: 2px solid #64748b;
            padding-left: 12px;
        }
        .dash-search-input {
            height: 42px;
            border: 1px solid #dbe3ef;
            background: #fff;
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 0 12px;
            margin-bottom: 12px;
        }
        .dash-search-input i { color: #64748b; }
        .dash-search-input input {
            border: 0;
            outline: none;
            width: 100%;
            height: 100%;
            font-size: 14px;
            color: #111827;
            background: transparent;
        }
        .dash-filter-row {
            display: grid;
            grid-template-columns: repeat(5, minmax(130px, 1fr)) auto;
            gap: 10px;
            align-items: end;
            padding-bottom: 12px;
            border-bottom: 1px solid #edf2f7;
        }
        .tag-filter-block {
            padding-top: 12px;
        }
        .tag-filter-title {
            display: flex;
            align-items: center;
            gap: 7px;
            color: #334155;
            font-size: 13px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .dashboard-tag-list,
        .active-filter-list {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .dash-chip {
            height: 26px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #334155;
            border-radius: 999px;
            padding: 0 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .dash-chip.active {
            color: #1d4ed8;
            border-color: #93c5fd;
            background: #eff6ff;
        }
        .board-result-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin: 0 0 10px;
        }
        .board-result-meta {
            color: #64748b;
            font-size: 13px;
            font-weight: 800;
        }
        .sample-card-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .sample-card {
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: 4px;
            padding: 12px;
            min-width: 0;
        }
        .sample-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .sample-card-code {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            font-size: 15px;
            font-weight: 900;
            color: #0f172a;
        }
        .sample-card-code span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sample-card-img {
            width: 100%;
            aspect-ratio: 16 / 6;
            object-fit: cover;
            background: #f1f5f9;
            border: 1px solid #e5ebf3;
            display: block;
            margin-bottom: 10px;
        }
        .sample-card-noimg {
            width: 100%;
            aspect-ratio: 16 / 6;
            background: #f8fafc;
            border: 1px solid #e5ebf3;
            color: #94a3b8;
            display: grid;
            place-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 800;
        }
        .sample-card-lines {
            display: grid;
            gap: 6px;
            font-size: 12px;
            color: #475569;
        }
        .sample-card-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .sample-card-strong { font-weight: 900; color: #334155; }
        .sample-card-footer {
            margin-top: 10px;
            padding-top: 9px;
            border-top: 1px solid #edf2f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .sample-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #475569;
            font-size: 12px;
            font-weight: 800;
            min-width: 0;
        }
        .sample-location span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card-status-ok { background: #ecfdf5; color: #059669; border: 1px solid #bbf7d0; }
        .card-status-off { background: #f3f4f6; color: #64748b; border: 1px solid #e5e7eb; }
        .card-status-warn { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
        .tag-pill {
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 7px;
            border-radius: 999px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 12px;
            font-weight: 700;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 22px;
            padding: 0 7px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
        }
        .status-ok { color: #047857; background: #ecfdf5; }
        .status-off { color: #6b7280; background: #f3f4f6; }
        .flow-plus { color: #047857; font-weight: 900; }
        .flow-minus { color: #dc2626; font-weight: 900; }
        .action-row {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-end;
        }
        .pager {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            color: #64748b;
            font-size: 12px;
        }
        .operation-grid {
            display: grid;
            grid-template-columns: minmax(260px, 1fr) auto;
            gap: 10px;
            align-items: end;
        }
        .operation-buttons {
            display: grid;
            grid-template-columns: repeat(4, minmax(90px, 1fr));
            gap: 8px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }
        .detail-item {
            border: 1px solid #edf2f7;
            border-radius: 7px;
            padding: 8px;
            min-height: 56px;
        }
        .detail-label { color: #64748b; font-size: 12px; margin-bottom: 5px; }
        .detail-value { color: #111827; font-size: 13px; font-weight: 700; word-break: break-all; white-space: normal; }
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, .42);
            z-index: 50;
            padding: 16px;
        }
        .modal.show { display: flex; }
        .modal-card {
            width: min(900px, 100%);
            max-height: min(88vh, 820px);
            overflow: hidden;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 22px 55px rgba(15, 23, 42, .25);
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
        }
        .modal-card.narrow { width: min(560px, 100%); }
        .modal-head, .modal-foot {
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .modal-foot {
            border-bottom: 0;
            border-top: 1px solid #edf2f7;
            justify-content: flex-end;
        }
        .modal-title { margin: 0; font-size: 16px; font-weight: 900; }
        .modal-body { padding: 12px; overflow: auto; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .form-grid .wide { grid-column: 1 / -1; }
        .checkbox-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #dbe3ef;
            border-radius: 7px;
            padding: 8px;
            min-height: 40px;
        }
        .tag-check {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 12px;
            font-weight: 700;
        }
        .tag-check input { width: auto; min-height: auto; margin: 0; }
        .toast {
            position: fixed;
            right: 18px;
            top: 18px;
            z-index: 80;
            min-width: 220px;
            max-width: min(420px, calc(100vw - 36px));
            padding: 10px 12px;
            border-radius: 8px;
            color: #fff;
            background: #111827;
            box-shadow: 0 12px 30px rgba(15, 23, 42, .22);
            display: none;
            font-size: 13px;
        }
        .toast.show { display: block; }
        .toast.error { background: #b91c1c; }
        .toast.success { background: #047857; }
        @media (max-width: 1180px) {
            .stats-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .filter-grid, .filter-grid.flow { grid-template-columns: repeat(3, minmax(140px, 1fr)); }
            .operation-grid { grid-template-columns: 1fr; }
            .dash-filter-row { grid-template-columns: repeat(3, minmax(130px, 1fr)); }
            .sample-card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 760px) {
            .app-shell { display: block; }
            .sidebar {
                position: sticky;
                top: 0;
                z-index: 20;
                height: auto;
                padding: 8px;
                overflow-x: auto;
                white-space: nowrap;
            }
            .brand { display: none; }
            .nav-btn {
                width: auto;
                display: inline-flex;
                margin-right: 5px;
            }
            .main { padding: 12px 10px 18px; }
            .topbar { align-items: flex-start; }
            .title-wrap h1 { font-size: 19px; }
            .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .filter-grid, .filter-grid.flow, .form-grid, .form-grid.two, .detail-grid {
                grid-template-columns: 1fr;
            }
            .search-center-head { align-items: flex-start; flex-direction: column; }
            .dash-filter-row { grid-template-columns: 1fr; }
            .sample-card-grid { grid-template-columns: 1fr; }
            .operation-buttons { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .table-wrap table { min-width: 900px; }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand"><i class="fa-solid fa-boxes-stacked"></i><span>样板库存</span></div>
        <button class="nav-btn active" data-tab="dashboard"><i class="fa-solid fa-chart-pie"></i>库存看板</button>
        <button class="nav-btn" data-tab="samples"><i class="fa-solid fa-table-list"></i>样板库存</button>
        <button class="nav-btn" data-tab="operation"><i class="fa-solid fa-right-left"></i>库存操作</button>
        <button class="nav-btn" data-tab="flows"><i class="fa-solid fa-clock-rotate-left"></i>库存流水</button>
        <button class="nav-btn" data-tab="tags"><i class="fa-solid fa-tags"></i>标签管理</button>
    </aside>
    <main class="main">
        <div class="topbar">
            <div class="title-wrap">
                <h1>样板库存管理</h1>
                <div class="sub">采购部 / 中文后台</div>
            </div>
            <div class="top-actions">
                <button class="btn" id="refreshAllBtn"><i class="fa-solid fa-rotate"></i>刷新</button>
                <a class="btn" href="{{ url_for('procurement_dept') }}"><i class="fa-solid fa-arrow-left"></i>采购部</a>
            </div>
        </div>

        <section id="tab-dashboard" class="section active">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label"><i class="fa-solid fa-box"></i>样板总数</div><div class="stat-value" id="statSamples">0</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fa-solid fa-cubes"></i>库存总量</div><div class="stat-value" id="statStock">0</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fa-solid fa-arrow-down"></i>今日入库</div><div class="stat-value" id="statIn">0</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fa-solid fa-flask"></i>研发累计入库</div><div class="stat-value" id="statResearchIn">0</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fa-solid fa-cart-shopping"></i>采购累计入库</div><div class="stat-value" id="statProcurementIn">0</div></div>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <h2 class="panel-title"><i class="fa-solid fa-chart-column"></i>累计入库量（按负责人和单位）</h2>
                    <span class="muted">研发、采购分别统计，不同单位分开汇总</span>
                </div>
                <div class="table-wrap" id="inboundSummaryTable"></div>
            </div>

            <div class="panel">
                <div class="search-center-head">
                    <div>
                        <h2 class="search-center-title">检索中心</h2>

<script>
const API = "/api/procurement/yangban";
const CURRENT_USER = {{ (user_name or "用户")|tojson }};
const flowLabels = { RuKu: "入库", ChuKu: "出库", GuiHuan: "归还", PanDian: "盘点" };
const statusLabels = { ZhengChang: "正常", TingYong: "停用" };
const state = {
    activeTab: "dashboard",
    options: { tags: [], active_tags: [], categories: [], locations: [], statuses: [] },
    samples: [],
    sampleChoices: [],
    tags: [],
    samplePage: 1,
    sampleTotalPages: 1,
    flowPage: 1,
    flowTotalPages: 1,
    dashboardTag: "",
    dashboardResults: [],
    sampleModalLegacy: [],
    loading: false
};

function esc(value) {
    return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}
function numberText(value) {
    if (value === "" || value == null) return "0";
    const n = Number(value);
    if (!Number.isFinite(n)) return esc(value);
    return n.toLocaleString("zh-CN", { maximumFractionDigits: 2 });
}
function toast(message, type) {
    const box = document.getElementById("toast");
    box.textContent = message || "";
    box.className = "toast show " + (type || "");
    clearTimeout(box._timer);
    box._timer = setTimeout(() => { box.className = "toast"; }, 2600);
}
async function apiJson(url, options) {
    const resp = await fetch(url, options || {});
    const data = await resp.json();
    if (!resp.ok || !data.success) {
        throw new Error(data.message || "请求失败");
    }
    return data.data || data;
}
async function apiPost(url, payload, method) {
    const resp = await fetch(url, {
        method: method || "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload || {})
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) {
        throw new Error(data.message || "请求失败");
    }
    return data;
}
async function apiForm(url, formData, method) {
    const resp = await fetch(url, {
        method: method || "POST",
        body: formData
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) {
        throw new Error(data.message || "请求失败");
    }
    return data;
}
function tagStyle(color) {
    const c = /^#[0-9a-fA-F]{6}$/.test(color || "") ? color : "#64748B";
    return `color:${c};border-color:${c}66;background:${c}14`;
}
function renderTags(tags) {
    if (!tags || !tags.length) return '<span class="muted">-</span>';
    return '<div class="tag-list">' + tags.map(t => {
        const name = t.name || t.BiaoQianMingCheng || t;
        const color = t.color || t.YanSe || "#64748B";
        return `<span class="tag-pill" style="${tagStyle(color)}">${esc(name)}</span>`;
    }).join("") + "</div>";
}
function statusPill(status) {
    const cls = status === "ZhengChang" ? "status-ok" : "status-off";
    return `<span class="status-pill ${cls}">${esc(statusLabels[status] || status || "-")}</span>`;
}
function emptyTable(text) {
    return `<div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px;">${esc(text || "暂无数据")}</div>`;
}
function buildPager(prefix, page, totalPages, total, pageSize) {
    const pageEl = document.getElementById(prefix + "PageText");
    const prev = document.getElementById(prefix + "Prev");
    const next = document.getElementById(prefix + "Next");
    if (pageEl) pageEl.textContent = `第 ${page} / ${totalPages} 页`;
    if (prev) prev.disabled = page <= 1;
    if (next) next.disabled = page >= totalPages;
    const meta = document.getElementById(prefix + "Meta");
    if (meta) {
        const start = total ? (page - 1) * pageSize + 1 : 0;
        const end = total ? Math.min(page * pageSize, total) : 0;
        meta.textContent = `共 ${total || 0} 条，当前 ${start}-${end} 条`;
    }
}

function setTab(tab) {
    state.activeTab = tab;
    document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
    document.querySelectorAll(".section").forEach(sec => sec.classList.toggle("active", sec.id === "tab-" + tab));
    if (tab === "dashboard") loadDashboard();
    if (tab === "samples") loadSamples(state.samplePage || 1);
    if (tab === "operation") loadOperationData();
    if (tab === "flows") loadFlows(state.flowPage || 1);
    if (tab === "tags") loadTags();
}

function fillSelect(selectId, values, allLabel, mapper) {
    const el = document.getElementById(selectId);
    if (!el) return;
    const current = el.value;
    el.innerHTML = allLabel == null ? "" : `<option value="">${esc(allLabel)}</option>`;
    (values || []).forEach(item => {
        const mapped = mapper ? mapper(item) : { value: item, label: item };
        el.insertAdjacentHTML("beforeend", `<option value="${esc(mapped.value)}">${esc(mapped.label)}</option>`);
    });
    if ([...el.options].some(o => o.value === current)) el.value = current;
}

async function loadOptions() {
    state.options = await apiJson(API + "/options");
    fillSelect("sfFenLei", state.options.categories, "全部");
    fillSelect("sfKuWei", state.options.locations, "全部");
    fillSelect("sfBiaoQian", state.options.tags || [], "全部", t => ({ value: t.BiaoQianMingCheng, label: t.BiaoQianMingCheng }));
    fillSelect("sfZhuangTai", ["ZhengChang", "TingYong"], "全部", s => ({ value: s, label: statusLabels[s] || s }));
    fillSelect("dashFenLei", state.options.categories, "全部分类");
    fillSelect("dashKuWei", state.options.locations, "全部库位");
    fillSelect("dashStatus", ["ZhengChang", "TingYong"], "全部状态", s => ({ value: s, label: statusLabels[s] || s }));
    renderDashboardTagFilters();
    renderDashboardSavedSearches();
}

function dashboardSavedKey() {
    return "yangban_dashboard_saved_searches_v1";
}
function getDashboardSavedSearches() {
    try {
        const data = JSON.parse(localStorage.getItem(dashboardSavedKey()) || "[]");
        return Array.isArray(data) ? data : [];
    } catch (e) {
        return [];
    }
}
function setDashboardSavedSearches(items) {
    localStorage.setItem(dashboardSavedKey(), JSON.stringify((items || []).slice(0, 8)));
}
function getDashboardCriteria() {
    return {
        q: (document.getElementById("dashKeyword")?.value || "").trim(),
        fenlei: (document.getElementById("dashFenLei")?.value || "").trim(),
        kuwei: (document.getElementById("dashKuWei")?.value || "").trim(),
        zhuangtai: (document.getElementById("dashStatus")?.value || "").trim(),
        start: (document.getElementById("dashStart")?.value || "").trim(),
        end: (document.getElementById("dashEnd")?.value || "").trim(),
        biaoqian: state.dashboardTag || ""
    };
}
function applyDashboardCriteria(criteria) {
    const c = criteria || {};
    setValue("dashKeyword", c.q || "");
    setValue("dashFenLei", c.fenlei || "");
    setValue("dashKuWei", c.kuwei || "");
    setValue("dashStatus", c.zhuangtai || "");
    setValue("dashStart", c.start || "");
    setValue("dashEnd", c.end || "");
    state.dashboardTag = c.biaoqian || "";
    renderDashboardTagFilters();
    renderDashboardActiveFilters();
}
function dashboardCriteriaLabel(criteria) {
    const c = criteria || {};
    const parts = [];
    if (c.q) parts.push(c.q);
    if (c.fenlei) parts.push(c.fenlei);
    if (c.biaoqian) parts.push(c.biaoqian);
    if (c.kuwei) parts.push(c.kuwei);
    if (c.zhuangtai) parts.push(statusLabels[c.zhuangtai] || c.zhuangtai);
    return parts.join(" / ") || "全部样板";
}
function renderDashboardSavedSearches() {
    const wrap = document.getElementById("dashboardSavedSearches");
    if (!wrap) return;
    const items = getDashboardSavedSearches();
    if (!items.length) {
        wrap.innerHTML = '<div class="saved-empty"><i class="fa-regular fa-bookmark"></i><span>暂无常用检索，点击“保存当前检索”添加</span></div>';
        return;
    }
    wrap.innerHTML = items.map((item, index) => `
        <button class="saved-chip" data-saved-index="${index}">
            <i class="fa-regular fa-bookmark"></i>${esc(item.name || dashboardCriteriaLabel(item.criteria))}
        </button>
    `).join("");
}
function saveDashboardSearch() {
    const criteria = getDashboardCriteria();
    const name = dashboardCriteriaLabel(criteria);
    const items = getDashboardSavedSearches().filter(item => JSON.stringify(item.criteria || {}) !== JSON.stringify(criteria));
    items.unshift({ name, criteria });
    setDashboardSavedSearches(items);
    renderDashboardSavedSearches();
    toast("常用检索已保存", "success");
}
function renderDashboardTagFilters() {
    const wrap = document.getElementById("dashboardTagFilters");
    if (!wrap) return;
    const tags = state.options.tags || [];
    if (!tags.length) {
        wrap.innerHTML = '<span class="muted">暂无标签</span>';
        return;
    }
    wrap.innerHTML = tags.map(tag => {
        const name = tag.BiaoQianMingCheng || "";
        const active = state.dashboardTag === name;
        return `<button class="dash-chip ${active ? "active" : ""}" data-dashboard-tag="${esc(name)}" style="${active ? tagStyle(tag.YanSe) : ""}">${esc(name)}</button>`;
    }).join("");
}
function renderDashboardActiveFilters() {
    const wrap = document.getElementById("dashboardActiveFilters");
    if (!wrap) return;
    const c = getDashboardCriteria();
    const chips = [];
    if (c.q) chips.push(["关键词", c.q]);
    if (c.fenlei) chips.push(["分类", c.fenlei]);
    if (c.start || c.end) chips.push(["时间", `${c.start || "不限"} 至 ${c.end || "不限"}`]);
    if (c.kuwei) chips.push(["库位", c.kuwei]);
    if (c.zhuangtai) chips.push(["状态", statusLabels[c.zhuangtai] || c.zhuangtai]);
    if (c.biaoqian) chips.push(["标签", c.biaoqian]);
    wrap.innerHTML = chips.length
        ? chips.map(([k, v]) => `<span class="dash-chip active">${esc(k)}：${esc(v)}</span>`).join("")
        : '<span class="muted">未设置筛选条件</span>';
}
function dashboardParams() {
    const criteria = getDashboardCriteria();
    const params = new URLSearchParams();

    if (criteria.zhuangtai) params.set("zhuangtai", criteria.zhuangtai);

async function submitOperation() {
    const type = document.getElementById("opType").value;
    const payload = {
        YangBanId: document.getElementById("opSample").value,
        BianDongLeiXing: type,
        BianDongShuLiang: document.getElementById("opQuantity").value,
        CaoZuoRen: document.getElementById("opOperator").value,
        GuanLianDanHao: document.getElementById("opRelatedNo").value,
        BeiZhu: document.getElementById("opRemark").value
    };
    if (type === "ChuKu" || type === "PanDian") {
        const text = type === "ChuKu" ? "确认执行出库？系统会同步扣减库存并写入流水。" : "确认执行盘点？盘点会修正库存并写入流水。";
        if (!confirm(text)) return;
    }
    try {
        const res = await apiPost(API + "/operations", payload);
        closeModal("operationModal");
        toast(`操作完成，当前库存：${numberText(res.data && res.data.new_stock)}`, "success");
        await Promise.all([loadDashboard(), loadSamples(state.samplePage), loadSampleChoices(), loadFlows(state.flowPage)]);

        YanSe: document.getElementById("tagColor").value,
        ZhuangTai: document.getElementById("tagStatus").value,
        BeiZhu: document.getElementById("tagRemark").value
    };
    try {
        await apiPost(API + "/tags" + (id ? "/" + id : ""), payload, id ? "PUT" : "POST");
        closeModal("tagModal");
        toast("标签已保存", "success");
        await Promise.all([loadOptions(), loadTags(), loadSamples(state.samplePage)]);
    } catch (e) {
        toast(e.message, "error");
    }
}
async function disableTag(id) {
    if (!confirm("确认停用该标签？停用后新样板不再允许选择。")) return;
    try {
        await apiPost(API + "/tags/" + id + "/disable", {});
        toast("标签已停用", "success");
        await Promise.all([loadOptions(), loadTags(), loadSamples(state.samplePage)]);
    } catch (e) {
        toast(e.message, "error");
    }
}

function bindEvents() {
    document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => setTab(btn.dataset.tab)));
    document.querySelectorAll("[data-tab-jump]").forEach(btn => btn.addEventListener("click", () => setTab(btn.dataset.tabJump)));
    document.querySelectorAll("[data-close]").forEach(btn => btn.addEventListener("click", () => closeModal(btn.dataset.close)));
    document.querySelectorAll(".modal").forEach(modal => modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("show"); }));
    document.getElementById("refreshAllBtn").addEventListener("click", initLoad);
    document.getElementById("runDashboardSearch").addEventListener("click", loadDashboardCards);
    document.getElementById("dashKeyword").addEventListener("keydown", e => { if (e.key === "Enter") loadDashboardCards(); });
    document.getElementById("saveDashboardSearch").addEventListener("click", saveDashboardSearch);
    document.getElementById("resetDashboardSearch").addEventListener("click", () => {
        applyDashboardCriteria({});
        loadDashboardCards();
    });
    document.getElementById("dashboardTagFilters").addEventListener("click", e => {
        const btn = e.target.closest("[data-dashboard-tag]");
        if (!btn) return;
        const tag = btn.dataset.dashboardTag || "";
        state.dashboardTag = state.dashboardTag === tag ? "" : tag;
        renderDashboardTagFilters();
        loadDashboardCards();
    });
    document.getElementById("dashboardSavedSearches").addEventListener("click", e => {
        const btn = e.target.closest("[data-saved-index]");
        if (!btn) return;
        const item = getDashboardSavedSearches()[Number(btn.dataset.savedIndex)];
        if (!item) return;
        applyDashboardCriteria(item.criteria || {});
        loadDashboardCards();
    });
    document.getElementById("dashboardSampleCards").addEventListener("click", e => {
        const detail = e.target.closest("[data-detail]");
        const copy = e.target.closest("[data-copy-location]");
        if (detail) openDetail(detail.dataset.detail);
        if (copy) {
            const value = copy.dataset.copyLocation || "";
            if (value && navigator.clipboard) {
                navigator.clipboard.writeText(value).then(() => toast("库位已复制", "success")).catch(() => toast(value || "无库位", "success"));
            } else {
                toast(value || "无库位", "success");
            }
        }
    });
    document.getElementById("searchSamples").addEventListener("click", () => loadSamples(1));
    document.getElementById("resetSampleFilters").addEventListener("click", () => {
        ["sfBianHao", "sfMingCheng", "sfFenLei", "sfBiaoQian", "sfKuWei", "sfZhuangTai"].forEach(id => setValue(id, ""));
        loadSamples(1);
    });
    document.getElementById("newSampleBtn").addEventListener("click", () => openSampleModal());
    document.getElementById("saveSampleBtn").addEventListener("click", saveSample);
    document.getElementById("mTuPian").addEventListener("change", function () {
        const file = this.files && this.files[0];
        if (file) {
            setPhotoPreview(URL.createObjectURL(file), file.name);
        } else {
            setPhotoPreview("", "未上传照片");
        }
    });
    document.getElementById("samplePrev").addEventListener("click", () => loadSamples(Math.max(1, state.samplePage - 1)));
    document.getElementById("sampleNext").addEventListener("click", () => loadSamples(Math.min(state.sampleTotalPages, state.samplePage + 1)));
    document.getElementById("sampleTable").addEventListener("click", e => {
        const detail = e.target.closest("[data-detail]");
        const edit = e.target.closest("[data-edit]");
        const disable = e.target.closest("[data-disable]");
        const op = e.target.closest("[data-row-op]");
        if (detail) openDetail(detail.dataset.detail);
        if (edit) openSampleModal(edit.dataset.edit);
        if (disable) disableSample(disable.dataset.disable);
        if (op) openOperation(op.dataset.rowOp, op.dataset.id);
    });
    document.querySelectorAll("[data-op]").forEach(btn => btn.addEventListener("click", () => openOperation(btn.dataset.op)));
    document.getElementById("submitOperationBtn").addEventListener("click", submitOperation);
    document.getElementById("searchFlows").addEventListener("click", () => loadFlows(1));
    document.getElementById("resetFlowFilters").addEventListener("click", () => {
        ["ffStart", "ffEnd", "ffSample", "ffType", "ffOperator"].forEach(id => setValue(id, ""));
        loadFlows(1);
    });
    document.getElementById("flowPrev").addEventListener("click", () => loadFlows(Math.max(1, state.flowPage - 1)));
    document.getElementById("flowNext").addEventListener("click", () => loadFlows(Math.min(state.flowTotalPages, state.flowPage + 1)));
    document.getElementById("exportFlows").addEventListener("click", () => {
        const params = flowParams(null, null);
        window.location.href = API + "/flows/export" + (params.toString() ? "?" + params.toString() : "");
    });
    document.getElementById("newTagBtn").addEventListener("click", () => openTagModal());
    document.getElementById("saveTagBtn").addEventListener("click", saveTag);
    document.getElementById("tagTable").addEventListener("click", e => {
        const edit = e.target.closest("[data-tag-edit]");
        const disable = e.target.closest("[data-tag-disable]");
        if (edit) openTagModal(edit.dataset.tagEdit);
        if (disable) disableTag(disable.dataset.tagDisable);
    });
}
async function initLoad() {
    try {
        await loadOptions();
        await Promise.all([loadDashboard(), loadSamples(1), loadSampleChoices(), loadFlows(1), loadTags()]);
        toast("已刷新", "success");
    } catch (e) {
        toast(e.message, "error");
    }
}
document.addEventListener("DOMContentLoaded", () => {
    bindEvents();
    initLoad();
});
</script>
</body>
</html>
