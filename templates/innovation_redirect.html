<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启动创新提案管理系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 90%;
        }

        .loading-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .loading-text {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            animation: loading 3s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .status-text {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 500;
            margin-top: 10px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .error-message {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #e74c3c;
            display: none;
        }
    </style>
    <link href="{{ url_for('static', filename='css/unified_theme.css') }}" rel="stylesheet">
</head>
<body>
    <div class="loading-container">
        <div class="loading-icon">
            <i class="fas fa-lightbulb"></i>
        </div>
        <h1 class="loading-title">启动创新提案管理系统</h1>
        <p class="loading-text">正在为您启动创新提案管理系统，请稍候...</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="status-text" id="statusText">正在初始化系统...</div>
        
        <div class="error-message" id="errorMessage">
            <strong>启动失败：</strong>无法连接到创新提案管理系统。请检查系统状态或联系管理员。
        </div>
        
        <a href="/dashboard" class="back-btn" id="backBtn" style="display: none;">
            <i class="fas fa-arrow-left"></i> 返回主控制台
        </a>
    </div>

    <script>
        let checkCount = 0;
        const maxChecks = 30; // 最多检查30次（30秒）
        const targetUrl = '{{ target_url }}';
        
        function updateStatus(message) {
            document.getElementById('statusText').textContent = message;
        }
        
        function checkSystemStatus() {
            checkCount++;
            
            if (checkCount > maxChecks) {
                // 超时显示错误
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('backBtn').style.display = 'inline-block';
                updateStatus('启动超时，请重试');
                return;
            }
            
            updateStatus(`正在检查系统状态... (${checkCount}/${maxChecks})`);
            
            fetch('/check_innovation_status')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ready') {
                        updateStatus('系统已就绪，正在新标签页中打开...');
                        setTimeout(() => {
                            window.open(data.url, '_blank');
                            updateStatus('已在新标签页中打开创新提案管理系统');
                            document.getElementById('backBtn').style.display = 'inline-block';
                        }, 1000);
                    } else {
                        // 继续检查
                        setTimeout(checkSystemStatus, 1000);
                    }
                })
                .catch(error => {
                    console.error('检查状态失败:', error);
                    setTimeout(checkSystemStatus, 1000);
                });
        }
        
        // 页面加载后开始检查
        {% if system_ready %}
            // 系统已就绪，立即在新标签页打开
            updateStatus('系统已就绪，正在新标签页中打开...');
            setTimeout(() => {
                window.open('{{ target_url }}', '_blank');
                updateStatus('已在新标签页中打开创新提案管理系统');
                document.getElementById('backBtn').style.display = 'inline-block';
            }, 1000);
        {% else %}
            // 系统未就绪，开始检查状态
            setTimeout(checkSystemStatus, 2000);
        {% endif %}
    </script>
</body>
</html>
