<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>月度目标导入 - 内容生产工厂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 0; }
        .upload-card { border-radius: 12px; box-shadow: 0 10px 24px rgba(0,0,0,0.08); }
        .status-box { background: #f8f9fa; border-radius: 8px; padding: 12px; }
        .hint { font-size: 0.9rem; color: #6c757d; }
    </style>
    <link href="{{ url_for('static', filename='css/unified_theme.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">
                <i class="fas fa-cube"></i> 图创AI系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('tk_project') }}">
                    <i class="fas fa-project-diagram"></i> 返回内容生产工厂
                </a>
                <a class="nav-link" href="{{ url_for('dashboard') }}">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1><i class="fas fa-file-excel"></i> 月度目标导入</h1>
            <p class="lead">通过Excel向数据库表 tk_yuedumubiao 写入（月度目标）一行数据</p>
        </div>
    </div>

    <div class="container my-4">
        <div class="card upload-card">
            <div class="card-body">
                <h5 class="card-title mb-3">上传Excel文件</h5>
                <p class="hint mb-2">
                    Excel首行需为表头，至少包含：
                    <span class="badge bg-secondary">年</span>、
                    <span class="badge bg-secondary">月</span>、
                    <span class="badge bg-secondary">店</span>。
                    其余列将按表头与数据库字段自动匹配，空值默认按 0 处理（数值字段）。
                </p>
                <div class="mb-3">
                    <input type="file" class="form-control" id="targetFile" accept=".xlsx,.xls">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" id="uploadBtn">
                        <i class="fas fa-upload"></i> 开始导入
                    </button>
                    <button class="btn btn-outline-secondary" id="resetBtn">
                        <i class="fas fa-undo"></i> 重置
                    </button>
                    <button class="btn btn-outline-success" id="downloadTemplateBtn">
                        <i class="fas fa-download"></i> 下载模板
                    </button>
                </div>

                <hr>

                <div class="status-box">
                    <div id="statusText" class="text-muted">等待导入...</div>
                    <div id="resultBox" class="mt-2" style="display:none;">
                        <div class="alert alert-success py-2" id="successMsg" style="display:none;"></div>
                        <div class="alert alert-danger py-2" id="errorMsg" style="display:none;"></div>
                        <div id="warnList" class="mt-2"></div>
                    </div>
                </div>

                <div class="mt-3 hint">
                    当前登录用户：<strong>{{ user_name }}</strong>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('targetFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const resultBox = document.getElementById('resultBox');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const warnList = document.getElementById('warnList');
        const downloadTemplateBtn = document.getElementById('downloadTemplateBtn');

        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            statusText.textContent = '等待导入...';
            resultBox.style.display = 'none';
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            warnList.innerHTML = '';
        });

        if (downloadTemplateBtn) {
            downloadTemplateBtn.addEventListener('click', () => {
                window.location.href = '/api/tk_monthly_target_import/template';
            });
        }

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) {
                alert('请先选择Excel文件');
                return;
            }
            statusText.textContent = '正在上传并导入，请稍候...';
            resultBox.style.display = 'none';
            warnList.innerHTML = '';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const resp = await fetch('/api/tk_monthly_target_import/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();
                resultBox.style.display = 'block';
                if (data.success) {
                    successMsg.style.display = 'block';
                    successMsg.textContent = data.message || '导入成功';
                    errorMsg.style.display = 'none';
                    if (data.warnings && data.warnings.length > 0) {
                        const list = document.createElement('ul');
                        list.className = 'mb-0';
                        data.warnings.forEach(w => {
                            const li = document.createElement('li');
                            li.textContent = w;
                            list.appendChild(li);
                        });
                        warnList.innerHTML = '<strong>提示：</strong>';
                        warnList.appendChild(list);
                    }
                    statusText.textContent = '导入完成';
                } else {
                    successMsg.style.display = 'none';
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.message || '导入失败';
                    statusText.textContent = '导入失败';
                }
            } catch (e) {
                resultBox.style.display = 'block';
                successMsg.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = '网络或服务器错误：' + e.message;
                statusText.textContent = '导入失败';
            }
        });
    </script>
</body>
</html>
