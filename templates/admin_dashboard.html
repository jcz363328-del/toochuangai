<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员功能 - 图创AI系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-section i {
            font-size: 1.5rem;
        }

        .logo-section h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .panel-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .panel-title i {
            color: #667eea;
            font-size: 2rem;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .admin-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .admin-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.1);
        }

        .admin-card-icon {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .admin-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .admin-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .admin-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .admin-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
            margin-right: 8px;
        }

        .coming-soon {
            opacity: 0.6;
            pointer-events: none;
        }

        .coming-soon .admin-btn {
            background: #6c757d;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .container {
                padding: 20px 15px;
            }
            
            .admin-panel {
                padding: 20px;
            }
            
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link href="{{ url_for('static', filename='css/unified_theme.css') }}" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <i class="fas fa-cog"></i>
                <h1>管理员功能</h1>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('dashboard') }}">
                    <i class="fas fa-home"></i> 返回主页
                </a>

            </nav>
        </div>
    </header>

    <div class="container">
        <div class="admin-panel">
            <div class="panel-title">
                <i class="fas fa-shield-alt"></i>
                <span>系统管理控制台</span>
            </div>
            <p style="color: #666; margin-bottom: 20px;">欢迎使用图创AI系统管理员功能，您可以在这里管理系统的各项设置和功能。</p>
            
            <div class="admin-grid">
                <!-- 用户权限管理 -->
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <i class="fas fa-users-cog"></i>
                    </div>
                    <h3><span class="status-indicator"></span>用户权限管理</h3>
                    <p>管理用户权限、部门配置和访问控制设置</p>
                    <a href="{{ url_for('permission_management') }}" class="admin-btn">
                        <i class="fas fa-cog"></i> 管理权限
                    </a>
                </div>

                <!-- 系统监控 -->
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <h3><span class="status-indicator"></span>系统监控</h3>
                    <p>查看系统运行状态、性能指标和使用统计</p>
                    <a href="#" class="admin-btn" onclick="showComingSoon('系统监控')">
                        <i class="fas fa-eye"></i> 查看监控
                    </a>
                </div>

                <!-- 数据管理 -->
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <i class="fas fa-database"></i>
                    </div>
                    <h3><span class="status-indicator"></span>数据管理</h3>
                    <p>数据备份、恢复和数据库维护操作</p>
                    <a href="#" class="admin-btn" onclick="showComingSoon('数据管理')">
                        <i class="fas fa-download"></i> 管理数据
                    </a>
                </div>

                <!-- 系统配置 -->
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <i class="fas fa-sliders-h"></i>
                    </div>
                    <h3><span class="status-indicator"></span>系统配置</h3>
                    <p>修改系统参数、功能开关和全局设置</p>
                    <a href="#" class="admin-btn" onclick="showComingSoon('系统配置')">
                        <i class="fas fa-wrench"></i> 系统设置
                    </a>
                </div>

                <!-- 日志管理 -->
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <h3><span class="status-indicator"></span>日志管理</h3>
                    <p>查看系统日志、错误记录和操作审计</p>
                    <a href="#" class="admin-btn" onclick="showComingSoon('日志管理')">
                        <i class="fas fa-list"></i> 查看日志
                    </a>
                </div>

                <!-- 创新系统管理 -->
                <div class="admin-card">
                    <div class="admin-card-icon">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <h3><span class="status-indicator"></span>创新系统管理</h3>
                    <p>管理创新提案系统的高级功能和设置</p>
                    <a href="{{ url_for('innovation.innovation_manage') }}" class="admin-btn">
                        <i class="fas fa-cogs"></i> 管理创新系统
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function _logMenuClick(menu, href) {
            const payload = JSON.stringify({ menu: menu || '', href: href || '' });
            try {
                if (navigator.sendBeacon) {
                    const blob = new Blob([payload], { type: 'application/json' });
                    navigator.sendBeacon('/api/menu_click', blob);
                    return;
                }
            } catch (e) {}
            try {
                fetch('/api/menu_click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload,
                    keepalive: true
                }).catch(() => {});
            } catch (e) {}
        }

        function showComingSoon(featureName) {
            _logMenuClick(featureName, '');
            alert(`${featureName}功能正在开发中，敬请期待！`);
        }

        // 添加卡片点击效果
        document.querySelectorAll('.admin-card').forEach(card => {
            card.addEventListener('click', function(e) {
                if (e.target.tagName !== 'A' && e.target.tagName !== 'I') {
                    const link = this.querySelector('a');
                    const titleEl = this.querySelector('h3');
                    const menu = (titleEl ? titleEl.textContent : '').trim();
                    const href = link ? (link.getAttribute('href') || '') : '';
                    if (menu) _logMenuClick(menu, link && link.href ? link.href : href);
                    if (link && !link.onclick) {
                        window.location.href = link.href;
                    } else if (link && link.onclick) {
                        link.click();
                    }
                }
            });
        });
    </script>
</body>
</html>
