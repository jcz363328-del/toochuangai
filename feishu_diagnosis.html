<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书环境诊断工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2em;
        }
        .status-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #007bff;
        }
        .status-success {
            border-left-color: #28a745;
            background: #d4edda;
        }
        .status-warning {
            border-left-color: #ffc107;
            background: #fff3cd;
        }
        .status-error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        .info-label {
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }
        .info-value {
            color: #6c757d;
            word-break: break-all;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .btn-success {
            background: #28a745;
        }
        .btn-success:hover {
            background: #1e7e34;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .recommendation {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
        }
        .recommendation h3 {
            color: #1976d2;
            margin-top: 0;
        }
        .headers-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .headers-table th,
        .headers-table td {
            border: 1px solid #dee2e6;
            padding: 8px 12px;
            text-align: left;
        }
        .headers-table th {
            background: #f8f9fa;
            font-weight: bold;
        }
        .present {
            color: #28a745;
            font-weight: bold;
        }
        .missing {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 飞书环境诊断工具</h1>
        
        <div id="loading" class="loading">
            <p>正在检测飞书环境...</p>
        </div>
        
        <div id="results" style="display: none;">
            <div id="status-summary"></div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">访问环境</div>
                    <div class="info-value" id="environment"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">用户识别状态</div>
                    <div class="info-value" id="user-status"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">飞书请求头</div>
                    <div class="info-value" id="headers-status"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">当前用户ID</div>
                    <div class="info-value" id="user-id"></div>
                </div>
            </div>
            
            <div id="recommendation" class="recommendation">
                <h3>📋 诊断建议</h3>
                <p id="recommendation-text"></p>
            </div>
            
            <h3>🔧 飞书请求头详情</h3>
            <table class="headers-table">
                <thead>
                    <tr>
                        <th>请求头名称</th>
                        <th>值</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="headers-table-body">
                </tbody>
            </table>
            
            <h3>📱 Session信息</h3>
            <div id="session-info"></div>
            
            <h3>🌐 环境信息</h3>
            <div id="env-info"></div>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="runDiagnosis()">🔄 重新检测</button>
            <button class="btn btn-success" onclick="window.open('/dashboard', '_blank')">🏠 返回主页</button>
        </div>
    </div>

    <script>
        async function runDiagnosis() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            
            try {
                const response = await fetch('/debug/feishu-env');
                const result = await response.json();
                
                if (result.success) {
                    displayResults(result.data);
                } else {
                    showError('诊断失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                showError('网络错误：' + error.message);
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('results').style.display = 'block';
        }
        
        function displayResults(data) {
            // 状态摘要
            const statusDiv = document.getElementById('status-summary');
            const diagnosis = data.diagnosis;
            let statusClass = 'status-card ';
            
            if (diagnosis.user_identified) {
                statusClass += 'status-success';
            } else if (diagnosis.headers_present) {
                statusClass += 'status-warning';
            } else {
                statusClass += 'status-error';
            }
            
            statusDiv.className = statusClass;
            statusDiv.innerHTML = `
                <h3>🎯 诊断结果</h3>
                <p><strong>环境：</strong>${diagnosis.environment}</p>
                <p><strong>状态：</strong>${diagnosis.user_identified ? '✅ 用户已识别' : '❌ 用户未识别'}</p>
            `;
            
            // 基本信息
            document.getElementById('environment').textContent = diagnosis.environment;
            document.getElementById('user-status').textContent = diagnosis.user_identified ? '✅ 已识别' : '❌ 未识别';
            document.getElementById('headers-status').textContent = diagnosis.headers_present ? '✅ 存在' : '❌ 缺失';
            document.getElementById('user-id').textContent = data.session_info.feishu_user_id || '未获取到';
            
            // 诊断建议
            document.getElementById('recommendation-text').textContent = diagnosis.recommendation;
            
            // 飞书请求头表格
            const headersTableBody = document.getElementById('headers-table-body');
            headersTableBody.innerHTML = '';
            
            Object.entries(data.feishu_headers).forEach(([key, value]) => {
                const row = headersTableBody.insertRow();
                row.insertCell(0).textContent = key;
                row.insertCell(1).textContent = value || '(空)';
                const statusCell = row.insertCell(2);
                if (value) {
                    statusCell.innerHTML = '<span class="present">✅ 存在</span>';
                } else {
                    statusCell.innerHTML = '<span class="missing">❌ 缺失</span>';
                }
            });
            
            // Session信息
            const sessionDiv = document.getElementById('session-info');
            sessionDiv.innerHTML = Object.entries(data.session_info)
                .map(([key, value]) => `
                    <div class="info-item">
                        <div class="info-label">${key}</div>
                        <div class="info-value">${value || '(空)'}</div>
                    </div>
                `).join('');
            
            // 环境信息
            const envDiv = document.getElementById('env-info');
            envDiv.innerHTML = `
                <div class="info-item">
                    <div class="info-label">User-Agent</div>
                    <div class="info-value">${data.user_agent}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Host</div>
                    <div class="info-value">${data.host}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">请求URL</div>
                    <div class="info-value">${data.request_url}</div>
                </div>
            `;
        }
        
        function showError(message) {
            const statusDiv = document.getElementById('status-summary');
            statusDiv.className = 'status-card status-error';
            statusDiv.innerHTML = `
                <h3>❌ 诊断失败</h3>
                <p>${message}</p>
            `;
        }
        
        // 页面加载时自动运行诊断
        window.onload = runDiagnosis;
    </script>
</body>
</html>
